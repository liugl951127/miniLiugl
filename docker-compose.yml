# =============================================================
# MiniMax Platform - 全栈 Docker Compose (V5.28)
#
# 一行启动所有服务 (中间件 + 13 微服务 + nginx):
#   docker compose up -d                 # 启动全部
#   docker compose ps                    # 查看状态
#   docker compose logs -f auth          # 查看日志
#   docker compose down                  # 停止
#
# 端口分配:
#   3000  nginx (前端统一入口)
#   3306  MySQL
#   6379  Redis
#   8848  Nacos
#   8080  Gateway
#   8081-8091, 8095  12 个微服务
#
# 服务配置 (容器网络 DNS):
#   MySQL:        mysql:3306
#   Redis:        redis:6379
#   Nacos:        nacos:8848
#   Gateway:      gateway:8080
#   其他服务:     <service-name>:<port>
# =============================================================

name: minimax-platform

# =============================================================
# 公共配置
# =============================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# =============================================================
# 网络
# =============================================================
networks:
  minimax-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================
# 数据卷
# =============================================================
volumes:
  minimax-mysql:
  minimax-redis:
  minimax-nacos:

# =============================================================
# 服务列表
# =============================================================
services:
  # ========== MySQL 8.0 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: minimax-mysql
    <<: *default-restart
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - minimax-mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Redis 7.2 ==========
  redis:
    image: redis:7.2-alpine
    container_name: minimax-redis
    <<: *default-restart
    command:
      - redis-server
      - --requirepass
      - "minimax_redis_2024"
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    ports:
      - "6379:6379"
    volumes:
      - minimax-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Nacos 服务发现 ==========
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    <<: *default-restart
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: minimax
      NACOS_AUTH_IDENTITY_VALUE: minimax
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - minimax-nacos:/home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Spring Cloud Gateway ==========
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: gateway
    image: minimax-gateway:latest
    container_name: minimax-gateway
    <<: *default-restart
    environment:
      SERVER_PORT: 7080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_NAMESPACE: public
    ports:
      - "7080:7080"
    depends_on:
      nacos:
        condition: service_started
    networks:
      - minimax-net
    logging: *default-logging

  # ========== auth 微服务 (8081) ==========
  auth:
