    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: prompt
    image: minimax-prompt:latest
    container_name: minimax-prompt
    <<: *default-restart
    environment:
      SERVER_PORT: 8091
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # V1.9.3: 注意! Spring Boot RedisProperties 字段是 password
      # 但 application.yml 用了 ${REDIS_PASS:default}, 所以 env 变量名是 REDIS_PASS
      REDIS_PASS: minimax_redis_2024
      NACOS_USER: nacos
      NACOS_PASS: nacos
      NACOS_NS: public
      # V1.9.3: OpenTelemetry Collector (分布式追踪)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ${SERVICE_NAME:-minimax-service}
    ports:
      - "8091:8091"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minimax-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8091/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      start_interval: 5s
    logging: *default-logging

