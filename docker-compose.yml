  # ========== OpenTelemetry Collector (分布式追踪 + 指标聚合) ==========
  # V1.9.3: 接收所有微服务的 OTLP 数据, 转存到本地文件
  # gateway/auth/chat 等微服务的 application-common.yml 默认 endpoint:
  #   ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: minimax-otel
    <<: *default-restart
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      TZ: Asia/Shanghai
    ports:
      - "4317:4317"   # OTLP gRPC (推荐)
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus 指标
    volumes:
      # V1.9.3: 配置 + 数据持久化
      - ./deploy-simple/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - ${DATA_ROOT:-/opt/minimax/data}/otel:/var/lib/otel
    networks:
      - minimax-net
    logging: *default-logging

  # ========== nginx 统一入口 (前端 + 反代, 端口 80) ==========
  # V1.9.6: 用 profile 控制 - 默认用宿主机 nginx, 需要时启用
  # 启用: docker compose --profile docker-nginx up -d nginx
  nginx:
    profiles: ["docker-nginx"]   # 默认不启动 (避免跟宿主机 nginx 冲突)
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    <<: *default-restart
    ports:
      - "80:80"
    volumes:
      - ./scripts/nginx-minimax-80.conf:/etc/nginx/conf.d/minimax.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - gateway
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Adminer (DB Web GUI, 可选) ==========
  adminer:
    image: adminer:4.8.1
    container_name: minimax-adminer
    <<: *default-restart
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      TZ: Asia/Shanghai
    ports:
      - "9090:8080"
    depends_on:
      - mysql
    profiles:
      - tools
    networks:
      - minimax-net
    logging: *default-logging