# =============================================================
# MiniMax Platform - 全栈 Docker Compose (V5.28)
#
# 一行启动所有服务 (中间件 + 13 微服务 + nginx):
#   docker compose up -d                 # 启动全部
#   docker compose ps                    # 查看状态
#   docker compose logs -f auth          # 查看日志
#   docker compose down                  # 停止
#
# 端口分配:
#   3000  nginx (前端统一入口)
#   3306  MySQL
#   6379  Redis
#   8848  Nacos
#   8080  Gateway
#   8081-8091, 8095  12 个微服务
#
# 服务配置 (容器网络 DNS):
#   MySQL:        mysql:3306
#   Redis:        redis:6379
#   Nacos:        nacos:8848
#   Gateway:      gateway:8080
#   其他服务:     <service-name>:<port>
# =============================================================

name: minimax-platform

# =============================================================
# 公共配置
# =============================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# =============================================================
# 网络
# =============================================================
networks:
  minimax-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================
# 数据卷
# =============================================================
volumes:
  # V1.9.3: 持久化数据 (Docker named volumes, 默认在 /var/lib/docker/volumes/)
  # 也可通过 bind mount 映射到 /opt/minimax/data/<service> (见下方各 service 配置)
  minimax-mysql:
  minimax-redis:
  minimax-nacos:
  minimax-otel:

# V1.9.3: 持久化数据默认 bind mount 到磁盘 (生产可改回 named volume)
# 用户可修改 DATA_ROOT 环境变量自定义路径
# 默认: /opt/minimax/data/{mysql,redis,nacos,otel}

# =============================================================
# 服务列表
# =============================================================
services:
  # ========== MySQL 8.0 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: minimax-mysql
    <<: *default-restart
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # V1.9.3: 数据持久化到磁盘 (默认 /opt/minimax/data/mysql, 可改)
      - ${DATA_ROOT:-/opt/minimax/data}/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Redis 7.2 ==========
  redis:
    image: redis:7.2-alpine
    container_name: minimax-redis
    <<: *default-restart
    command:
      - redis-server
      - --requirepass
      - "minimax_redis_2024"
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
    ports:
      - "6379:6379"
    volumes:
      # V1.9.3: AOF 持久化文件保存到磁盘
      - ${DATA_ROOT:-/opt/minimax/data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Nacos 服务发现 ==========
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    <<: *default-restart
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: minimax
      NACOS_AUTH_IDENTITY_VALUE: minimax
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      # V1.9.3: Nacos 配置 + 日志持久化
      - ${DATA_ROOT:-/opt/minimax/data}/nacos:/home/nacos/data
      - ${DATA_ROOT:-/opt/minimax/data}/nacos/logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - minimax-net
    logging: *default-logging

  # ========== Spring Cloud Gateway ==========
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: gateway
    image: minimax-gateway:latest
    container_name: minimax-gateway
    <<: *default-restart
    environment:
      SERVER_PORT: 7080
      SPRING_PROFILES_ACTIVE: dev
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_NAMESPACE: public
      # V1.9.3: OpenTelemetry Collector (分布式追踪)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ${SERVICE_NAME:-minimax-service}
    ports:
      - "7080:7080"
    depends_on:
      nacos:
        condition: service_started
    networks:
      - minimax-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:7080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      start_interval: 5s
    logging: *default-logging

  # ========== auth 微服务 (8081) ==========
  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: auth
    image: minimax-auth:latest
    container_name: minimax-auth
    <<: *default-restart
    environment:
      SERVER_PORT: 8081
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # V1.9.3: 注意! Spring Boot RedisProperties 字段是 password
      # 但 application.yml 用了 ${REDIS_PASS:default}, 所以 env 变量名是 REDIS_PASS
      REDIS_PASS: minimax_redis_2024
      NACOS_USER: nacos
      NACOS_PASS: nacos
      NACOS_NS: public
      # V1.9.3: OpenTelemetry Collector (分布式追踪)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ${SERVICE_NAME:-minimax-service}
    ports:
      - "8081:8081"
    depends_on:
      nacos:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minimax-net
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 384M
    healthcheck:
