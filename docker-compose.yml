      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: minimax_redis_2024
      NACOS_USER: nacos
      NACOS_PASS: nacos
      NACOS_NS: public
    ports:
      - "8081:8081"
    depends_on:
