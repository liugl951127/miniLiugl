# ============================================================
# Docker Compose V3.5.3+ 完整 17 微服务 + 基础设施 + Nginx
# 用法:
#   docker compose build  # 构建所有镜像
#   docker compose up -d  # 启动
#   docker compose down  # 停止
#   docker compose logs -f minimax-ai  # 看日志
# ============================================================

version: "3.9"

# ============== 基础设施 ==============
services:
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [minimax-net]

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: redis-server --requirepass minimax_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [minimax-net]

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [minimax-net]

  # ============== 16 微服务 ==============
  # 用法: 每个服务 build 自己的镜像 (Dockerfile.module)
  # docker build --build-arg MODULE=minimax-ai -t minimax/ai:1.0 .

  minimax-common:
    image: minimax/common:1.0
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
      args: { MODULE: minimax-common }
    container_name: minimax-common
    restart: "no"  # lib, 不启动
    networks: [minimax-net]

  minimax-gateway:
    image: minimax/gateway:1.0
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
      args: { MODULE: minimax-gateway }
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: minimax_platform
      DB_USER: root
      DB_PASS: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: minimax_redis_2024
      NACOS_SERVER: nacos:8848
    ports:
      - "7080:7080"
    networks: [minimax-net]

  minimax-auth:
    image: minimax/auth:1.0
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
