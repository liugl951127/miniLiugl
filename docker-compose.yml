# =============================================================
# MiniMax Platform V3.5.8+ 一键部署
#
# 关键设计:
#   ✓ Maven repo 挂载磁盘 (避免重复下载)
#   ✓ 17 微服务 + 3 基础服务 + Nginx
#   ✓ 每个服务用 layered jar (Docker 缓存最优)
#   ✓ 启动顺序: 基础设施 → 业务服务
#
# 用法:
#   ./scripts/deploy.sh up         # 一键启动
#   ./scripts/deploy.sh down       # 停止
#   ./scripts/deploy.sh status     # 状态
#   ./scripts/deploy.sh logs       # 日志
#   ./scripts/deploy.sh per <svc>  # 单服务部署
# =============================================================
version: "3.9"

# ============== 共享 Maven 卷 (关键! 避免重复下载) ==============
x-maven-volumes: &maven-volumes
  - ./.docker-data/maven-repo:/root/.m2
  - ./.docker-data/logs:/var/log/minimax

services:
  # ============== 基础设施 ==============
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--innodb-buffer-pool-size=512M"]
    ports: ["3306:3306"]
    volumes:
      - ./.docker-data/mariadb:/var/lib/mysql
      - ./sql/00-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/01-seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [minimax-net]
    deploy:
      resources: { limits: { memory: 1G } }

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: redis-server --requirepass minimax_redis_2024 --maxmemory 256mb
    ports: ["6379:6379"]
    volumes: [./.docker-data/redis:/data]
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  # ============== Nacos 服务注册 + 配置中心 (V3.5.9) ==============
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      # 鉴权配置 (V3.5.9+: 用户提供的 base64 token)
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "${NACOS_AUTH_TOKEN:mVsZlpnzIoXX8f+SxZPIJbsbQyatC3J+9EKrE6pJA2w=}"
      NACOS_AUTH_IDENTITY_KEY: "${NACOS_AUTH_IDENTITY_KEY:minimax-nacos}"
      NACOS_AUTH_IDENTITY_VALUE: "${NACOS_AUTH_IDENTITY_VALUE:minimax-nacos-secret-2026}"
    command: ["sh", "-c", "echo 'nacos.core.auth.plugin.nacos.token.secret.key=${NACOS_AUTH_TOKEN}' > /home/nacos/conf/application.properties && echo 'nacos.core.auth.server.identity.key=${NACOS_AUTH_IDENTITY_KEY}' >> /home/nacos/conf/application.properties && echo 'nacos.core.auth.server.identity.value=${NACOS_AUTH_IDENTITY_VALUE}' >> /home/nacos/conf/application.properties && bin/startup.sh -m standalone && tail -f /home/nacos/logs/start.out"]
    ports: ["8848:8848", "9848:9848"]
    volumes:
      - ./.docker-data/nacos/logs:/home/nacos/logs
      - ./.docker-data/nacos/data:/home/nacos/data
      - ./.docker-data/nacos/init.d:/home/nacos/conf/init.d
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 1G } } }
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8848/nacos/ | grep -q '200' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ============== 17 业务微服务 ==============
  gateway:
    build: { context: ./backend, dockerfile: minimax-gateway/Dockerfile }
    image: minimax/gateway:latest
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on: { mariadb: { condition: service_healthy } }
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    ports: ["7080:7080"]
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  auth:
    build: { context: ./backend, dockerfile: minimax-auth/Dockerfile }
    image: minimax/auth:latest
    container_name: minimax-auth
    restart: unless-stopped
    depends_on: { mariadb: { condition: service_healthy } }
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    ports: ["8081:8081"]
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  ai:
    build: { context: ./backend, dockerfile: minimax-ai/Dockerfile }
    image: minimax/ai:latest
    container_name: minimax-ai
    restart: unless-stopped
    depends_on: { mariadb: { condition: service_healthy } }
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    ports: ["8094:8094"]
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  chat:
    build: { context: ./backend, dockerfile: minimax-chat/Dockerfile }
    image: minimax/chat:latest
    container_name: minimax-chat
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }


  model:
    build: { context: ./backend, dockerfile: minimax-model/Dockerfile }
    image: minimax/model:latest
    container_name: minimax-model
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  rag:
    build: { context: ./backend, dockerfile: minimax-rag/Dockerfile }
    image: minimax/rag:latest
    container_name: minimax-rag
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }


  multimodal:
    build: { context: ./backend, dockerfile: minimax-multimodal/Dockerfile }
    image: minimax/multimodal:latest
    container_name: minimax-multimodal
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  monitor:
    build: { context: ./backend, dockerfile: minimax-monitor/Dockerfile }
    image: minimax/monitor:latest
    container_name: minimax-monitor
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    ports: ["8089:8089"]
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  admin:
    build: { context: ./backend, dockerfile: minimax-admin/Dockerfile }
    image: minimax/admin:latest
    container_name: minimax-admin
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    ports: ["8090:8090"]
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }


  agent:
    build: { context: ./backend, dockerfile: minimax-agent/Dockerfile }
    image: minimax/agent:latest
    container_name: minimax-agent
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  analytics:
    build: { context: ./backend, dockerfile: minimax-analytics/Dockerfile }
    image: minimax/analytics:latest
    container_name: minimax-analytics
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  pipeline:
    build: { context: ./backend, dockerfile: minimax-pipeline/Dockerfile }
    image: minimax/pipeline:latest
    container_name: minimax-pipeline
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  ws:
    build: { context: ./backend, dockerfile: minimax-ws/Dockerfile }
    image: minimax/ws:latest
    container_name: minimax-ws
    restart: unless-stopped
    depends_on: [mariadb]
    environment: { SPRING_PROFILES_ACTIVE: mysql, JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC" }
    volumes: *maven-volumes
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 256M } } }

  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on: [gateway, auth, ai]
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx-host.conf:/etc/nginx/nginx.conf:ro
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 64M } } }

volumes: {}
networks:
  minimax-net: { driver: bridge }
