# ============================================================
# Docker Compose (V2.8.0) - 本地一键启动 17 微服务
# 用法: docker compose up -d
# ============================================================

version: "3.9"

services:
  # 基础设施
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "minimax_redis_2024"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: minimax-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 微服务 (按模块)
  minimax-gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
      args:
        MODULE: minimax-gateway
    container_name: minimax-gateway
    restart: unless-stopped
    ports:
      - "7080:7080"
    depends_on:
      nacos:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_SERVER: nacos:8848
      DB_HOST: mariadb
      REDIS_HOST: redis

  minimax-auth:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
      args:
        MODULE: minimax-auth
    container_name: minimax-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - nacos
      - mariadb
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_SERVER: nacos:8848
      DB_HOST: mariadb

  minimax-ai:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.module
      args:
        MODULE: minimax-ai
    container_name: minimax-ai
    restart: unless-stopped
    ports:
      - "8094:8094"
    depends_on:
      - nacos
      - mariadb
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_SERVER: nacos:8848
      DB_HOST: mariadb

volumes:
  mariadb_data:
  redis_data:
