# =============================================================
# MiniMax Platform - 全栈中间件 Docker Compose (V5.20)
#
# 一行启动所有中间件:
#   docker compose up -d                # 必选 (MySQL + Redis + Nacos)
#   docker compose --profile monitoring up -d   # 可选 (Prometheus + Grafana)
#   docker compose --profile tracing up -d      # 可选 (Jaeger + OTel Collector)
#   docker compose --profile search up -d       # 可选 (ES + Kibana)
#
# 端口分配:
#   3000  nginx (前端, 需在 host 启动或用 deploy/nginx)
#   3306  MySQL
#   6379  Redis
#   8080  Gateway (Spring Cloud Gateway, 不在 compose, 用 deploy-minimax.sh 或 mvn)
#   8848  Nacos
#   9090  Prometheus (可选 profile=monitoring)
#   3001  Grafana (可选 profile=monitoring)
#   16686 Jaeger UI (可选 profile=tracing)
#   9200  Elasticsearch (可选 profile=search)
#   5601  Kibana (可选 profile=search)
# =============================================================

version: '3.8'

services:
  # ========== 必选: 核心中间件 ==========
  mysql:
    image: mysql:8.0
    container_name: minimax-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: minimax_root_2024
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: minimax
      MYSQL_PASSWORD: minimax_pass_2024
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pminimax_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - minimax-net

  redis:
    image: redis:7.2-alpine
    container_name: minimax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "minimax_redis_2024"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minimax-net

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"   # gRPC
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 1g
      JVM_XMN: 512m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"
      NACOS_AUTH_IDENTITY_KEY: "minimaxKey"
      NACOS_AUTH_IDENTITY_VALUE: "minimaxSecret"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
      - ./data/nacos/data:/home/nacos/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - minimax-net

  # ========== 可选 profile: 监控 (Prometheus + Grafana) ==========
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: minimax-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    profiles: ["monitoring"]
    networks:
      - minimax-net

  grafana:
    image: grafana/grafana:10.2.2
    container_name: minimax-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"   # 避免与 nginx 3000 冲突
    environment:
      GF_SECURITY_ADMIN_PASSWORD: minimax_grafana_2024
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles: ["monitoring"]
    networks:
      - minimax-net

  # ========== 可选 profile: 分布式追踪 (Jaeger + OTLP) ==========
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: minimax-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector (HTTP)
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
    volumes:
      - ./data/jaeger:/badger
    profiles: ["tracing"]
    networks:
      - minimax-net

  # ========== 可选 profile: 搜索 (ES + Kibana) ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: minimax-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
    profiles: ["search"]
    networks:
      - minimax-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: minimax-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    profiles: ["search"]
    networks:
      - minimax-net

  # ========== 工具: Adminer (Web DB GUI) ==========
  adminer:
    image: adminer:latest
    container_name: minimax-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - minimax-net

networks:
  minimax-net:
    driver: bridge

# =============================================================
# 用法:
#   # 1. 启动必选 (MySQL + Redis + Nacos + Adminer)
#   docker compose up -d
#
#   # 2. 启动监控 (Prometheus + Grafana)
#   docker compose --profile monitoring up -d
#
#   # 3. 启动追踪 (Jaeger)
#   docker compose --profile tracing up -d
#
#   # 4. 启动搜索 (ES + Kibana)
#   docker compose --profile search up -d
#
#   # 5. 全部启动
#   docker compose --profile monitoring --profile tracing --profile search up -d
#
#   # 6. 停止
#   docker compose down
#
#   # 7. 完全清理 (含数据)
#   docker compose down -v
# =============================================================