  # ============== Nginx 反向代理 ==============
  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on:
      - minimax-gateway
    volumes:
      - ./scripts/nginx-minimax-80.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks: [minimax-net]

# ============== Volume ==============
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  nacos_data:
    driver: local

# ============== Network ==============
networks:
  minimax-net:
    driver: bridge
