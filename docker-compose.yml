version: '3.8'

services:
  # ============ 基础设施 ============
  mysql:
    image: mysql:8.0
    container_name: minimax-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: minimax_root_2024
      MYSQL_DATABASE: minimax_platform
      MYSQL_USER: minimax
      MYSQL_PASSWORD: minimax_pass_2024
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pminimax_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: minimax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --requirepass minimax_redis_2024
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: minimax-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:latest
    container_name: minimax-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minimax_admin
      MINIO_ROOT_PASSWORD: minimax_minio_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

  # ============ 应用层（Day 2+ 启用）============
  minimax-gateway:
    build:
      context: ./backend
      dockerfile: minimax-gateway/Dockerfile
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    profiles: ["app"]

  minimax-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minimax-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - minimax-gateway
    profiles: ["app"]

  # ============ 监控（Day 12 启用）============
  prometheus:
    image: prom/prometheus:latest
    container_name: minimax-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: minimax-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=minimax_grafana_2024
    volumes:
      - ./data/grafana:/var/lib/grafana
    profiles: ["monitoring"]
