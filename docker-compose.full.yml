# =============================================================
# MiniMax Platform V3.5.8 全量部署 (17 微服务)
# 内存需求: 8GB+ (推荐 16GB)
# 用法:
#   ./start-all.sh up        # 一键启动
#   ./start-all.sh down      # 停止
#   ./start-all.sh status    # 状态
#   ./start-all.sh logs      # 日志
#   ./start-all.sh repair    # 修复重建
# =============================================================
version: "3.9"

# ============== 基础设施 ==============
services:
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb-buffer-pool-size=512M
    ports: ["3306:3306"]
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/complete.sql:/docker-entrypoint-initdb.d/01-complete.sql:ro
      - ./sql/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [minimax-net]
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 512M }

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: redis-server --requirepass minimax_redis_2024 --maxmemory 256mb
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [minimax-net]
    deploy:
      resources:
        limits: { memory: 384M }

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: minimax-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports: ["8848:8848", "9848:9848"]
    volumes:
      - nacos_data:/home/nacos/data
    networks: [minimax-net]
    deploy:
      resources:
        limits: { memory: 1G }

  # ============== 15 微服务 (Spring Boot fat jar) ==============
  gateway:
    build:
      context: ./backend
      dockerfile: minimax-gateway/Dockerfile
    image: minimax/gateway:latest
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
    ports: ["7080:7080"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
      - .docker-volumes/logs:/var/log/minimax
    networks: [minimax-net]
    deploy:
      resources: { limits: { memory: 512M } }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./backend
      dockerfile: minimax-auth/Dockerfile
    image: minimax/auth:latest
    container_name: minimax-auth
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
      nacos: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    ports: ["8081:8081"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
      - .docker-volumes/logs:/var/log/minimax
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  ai:
    build:
      context: ./backend
      dockerfile: minimax-ai/Dockerfile
    image: minimax/ai:latest
    container_name: minimax-ai
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
      nacos: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    ports: ["8094:8094"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
      - .docker-volumes/logs:/var/log/minimax
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  chat:
    build:
      context: ./backend
      dockerfile: minimax-chat/Dockerfile
    image: minimax/chat:latest
    container_name: minimax-chat
    restart: unless-stopped
    depends_on: [mariadb, redis, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  memory:
    build:
      context: ./backend
      dockerfile: minimax-memory/Dockerfile
    image: minimax/memory:latest
    container_name: minimax-memory
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  model:
    build:
      context: ./backend
      dockerfile: minimax-model/Dockerfile
    image: minimax/model:latest
    container_name: minimax-model
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  rag:
    build:
      context: ./backend
      dockerfile: minimax-rag/Dockerfile
    image: minimax/rag:latest
    container_name: minimax-rag
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  monitor:
    build:
      context: ./backend
      dockerfile: minimax-monitor/Dockerfile
    image: minimax/monitor:latest
    container_name: minimax-monitor
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    ports: ["8089:8089"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  admin:
    build:
      context: ./backend
      dockerfile: minimax-admin/Dockerfile
    image: minimax/admin:latest
    container_name: minimax-admin
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    ports: ["8090:8090"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  function:
    build:
      context: ./backend
      dockerfile: minimax-function/Dockerfile
    image: minimax/function:latest
    container_name: minimax-function
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  multimodal:
    build:
      context: ./backend
      dockerfile: minimax-multimodal/Dockerfile
    image: minimax/multimodal:latest
    container_name: minimax-multimodal
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  prompt:
    build:
      context: ./backend
      dockerfile: minimax-prompt/Dockerfile
    image: minimax/prompt:latest
    container_name: minimax-prompt
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  agent:
    build:
      context: ./backend
      dockerfile: minimax-agent/Dockerfile
    image: minimax/agent:latest
    container_name: minimax-agent
    restart: unless-stopped
    depends_on: [mariadb, redis, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  analytics:
    build:
      context: ./backend
      dockerfile: minimax-analytics/Dockerfile
    image: minimax/analytics:latest
    container_name: minimax-analytics
    restart: unless-stopped
    depends_on: [mariadb, redis, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  pipeline:
    build:
      context: ./backend
      dockerfile: minimax-pipeline/Dockerfile
    image: minimax/pipeline:latest
    container_name: minimax-pipeline
    restart: unless-stopped
    depends_on: [mariadb, nacos]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  # ============== Nginx (统一入口) ==============
  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on: [gateway, auth, ai]
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 64M } } }

# ============== 持久化卷 ==============
volumes:
  mariadb_data:
  redis_data:
  nacos_data:

# ============== 网络 ==============
networks:
  minimax-net:
    driver: bridge
