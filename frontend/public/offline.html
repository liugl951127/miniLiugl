<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <title>离线模式 - MiniMax</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1f2a44 0%, #0b1220 100%);
      color: #e4e6eb;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 480px; text-align: center; padding: 40px 30px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .icon {
      width: 100px; height: 100px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 12px 24px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #6366f1; color: #fff;
    }
    .btn-primary:hover { background: #5558e3; }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1); color: #e4e6eb;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }
    .status { margin-top: 20px; font-size: 12px; color: #64748b; }
    .status .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #f59e0b; margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .cached-list {
      margin-top: 24px; text-align: left;
      background: rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 16px;
    }
    .cached-list h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
    .cached-list a {
      display: block; padding: 8px 12px; margin: 4px 0;
      background: rgba(99, 102, 241, 0.1); border-radius: 6px;
      color: #c7d2fe; text-decoration: none; font-size: 13px;
      transition: all 0.2s;
    }
    .cached-list a:hover { background: rgba(99, 102, 241, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>网络不可用</h1>
    <p>
      您当前处于离线模式. MiniMax PWA 已缓存关键页面, 可继续访问已浏览过的功能.
      实时协作/AI 推理等需要网络的功能暂不可用.
    </p>
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">🔄 重试连接</button>
      <button class="btn-secondary" onclick="goBack()">← 返回</button>
    </div>
    <div class="status">
      <span class="dot"></span> 等待网络恢复...
    </div>

    <div class="cached-list">
      <h3>💾 离线可用页面</h3>
      <a href="/">🏠 首页</a>
      <a href="/ai/chat">💬 AI 对话 (历史)</a>
      <a href="/ai/playground">🛠️ 工具演练场</a>
      <a href="/collab">👥 协作 (只读)</a>
      <a href="/docs/USER_GUIDE.md">📖 用户指南</a>
    </div>
  </div>

  <script>
    function goBack() {
      if (history.length > 1) history.back();
      else location.href = '/';
    }

    // 网络恢复时自动刷新
    window.addEventListener('online', () => {
      document.querySelector('.status').innerHTML = '<span class="dot" style="background:#10b981"></span> 网络已恢复, 自动刷新中...';
      setTimeout(() => location.reload(), 1000);
    });
  </script>
</body>
</html>
