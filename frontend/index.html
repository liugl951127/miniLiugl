<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MiniMax" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniMax 大模型平台</title>
    <style>
      html, body, #app { height: 100%; margin: 0; padding: 0; }
      #initial-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #1f2a44 0%, #0b1220 100%);
        color: #fff; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        z-index: 9999;
      }
      #initial-loader .logo { font-size: 32px; font-weight: 700; margin-bottom: 8px;
        background: linear-gradient(90deg, #5b8def, #b66dff);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      #initial-loader .sub { color: #aab4cf; font-size: 14px; margin-bottom: 24px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #5b8def;
        display: inline-block; margin: 0 4px; animation: bounce 1.4s infinite ease-in-out both; }
      .dot:nth-child(2) { animation-delay: -0.32s; }
      .dot:nth-child(3) { animation-delay: -0.16s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="initial-loader">
        <div class="logo">MiniMax</div>
        <div class="sub">大模型应用平台 · 加载中</div>
        <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // 注册 Service Worker (PWA 离线支持)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg.scope);
          }).catch(err => {
            console.warn('SW register failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
