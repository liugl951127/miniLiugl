# =============================================================
# MiniMax Platform - Nginx 安全 Headers
# =============================================================
# 由 nginx/install-nginx.sh 部署到 /etc/nginx/conf.d/minimax-security.conf
# 在 nginx.conf server 块中 include 使用
# =============================================================

# ============== 防止常见攻击 ==============

# 防止点击劫持 (Clickjacking)
add_header X-Frame-Options "SAMEORIGIN" always;

# 防止 MIME 类型嗅探
add_header X-Content-Type-Options "nosniff" always;

# 启用浏览器 XSS 保护
add_header X-XSS-Protection "1; mode=block" always;

# Referrer 策略 (跨域请求时只发 origin)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ============== 权限策略 ==============

# 限制浏览器特性
add_header Permissions-Policy "
    geolocation=(),
    microphone=(),
    camera=(),
    payment=(),
    usb=(),
    magnetometer=(),
    gyroscope=(),
    accelerometer=()
" always;

# ============== 内容安全策略 (CSP) ==============

# 默认禁止所有, 允许同源 + 内联 (兼容 Vue 启动)
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    font-src 'self' data:;
    connect-src 'self' ws: wss:;
    media-src 'self' blob:;
    object-src 'none';
    frame-ancestors 'self';
    base-uri 'self';
    form-action 'self';
" always;

# ============== HTTPS 严格传输 (HSTS) ==============
# ⚠️  仅在 HTTPS 站点启用, HTTP 站点会卡住
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ============== 隐藏服务器信息 ==============
# server_tokens off;  # 已在 nginx.conf 设

# ============== 跨域 (CORS) ==============
# 已在各 location 单独配 X-Forwarded-* 头
# 如需 CORS 跨域, 解开下面注释 (⚠️  生产慎用)
# add_header Access-Control-Allow-Origin "*" always;
# add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
# add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
