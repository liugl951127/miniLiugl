# ============================================================
# MiniMax Platform V3.5.5+ Nginx 配置
# 单端口 80 入口, 反向代理到 5 个后端微服务
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 后端服务 upstream
    upstream auth_service   { server auth:8081;      keepalive 16; }
    upstream ai_service     { server ai:8094;        keepalive 16; }
    upstream gateway_service{ server gateway:7080;   keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        # 健康检查
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ============== 前端静态资源 + SPA 路由 ==============
        # 优先返回 index-mini.html (精简模式专属控制台), 退回 index.html (完整 Vue SPA)
        # 重要: vue-router history 模式需要 fallback, 否则刷新 /dashboard 会 404
        location = / {
            root   /usr/share/nginx/html;
            try_files /index-mini.html /index.html;
        }
        location / {
            root   /usr/share/nginx/html;
            index  index-mini.html index.html;
            # 先查静态文件, 再 fallback 到 SPA index (支持 vue-router history 模式)
            try_files $uri $uri/ /index-mini.html /index.html;
        }

        # H2 控制台 (开发调试用, 生产建议禁用)
        location /h2-console/ {
            proxy_pass http://ai_service/;
        }

        # 静态资源缓存 (1 天)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root   /usr/share/nginx/html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # Service Worker (PWA)
        location = /sw.js {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
        }

        # 鉴权服务 (auth) — 前端调用路径: /api/v1/auth/*
        location /api/v1/auth/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI 服务 (核心) — 前端调用路径: /api/v1/ai/*
        location /api/v1/ai/ {
            proxy_pass         http://ai_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API 网关 (其他业务) — 前端调用路径: /api/v1/* (除 auth/ai 外)
        location /api/v1/ {
            proxy_pass         http://gateway_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 兼容旧路径 /api/
        location /api/ {
            proxy_pass         http://gateway_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
