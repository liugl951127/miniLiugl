# ============================================================
# MiniMax Platform V3.5.5+ 宿主 Nginx 配置
# 单端口 80 入口:
#   /             → /usr/share/nginx/html  (前端 Vue3 SPA)
#   /api/v1/auth/* → 127.0.0.1:8081 (auth 容器)
#   /api/v1/ai/*   → 127.0.0.1:8094 (ai 容器)
#   /api/v1/*      → 127.0.0.1:7080 (gateway 容器)
#
# 由 nginx/install-nginx.sh 自动部署到 /etc/nginx/conf.d/minimax.conf
# ============================================================

# 后端 upstream (从独立文件 include, 便于复用)
include /etc/nginx/conf.d/minimax-upstream.conf;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 日志 (写到 /var/log/nginx + systemd journal)
    access_log /var/log/nginx/minimax-access.log;
    error_log  /var/log/nginx/minimax-error.log warn;

    # 上传文件大小
    client_max_body_size 50M;

    # 性能
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ============== 健康检查 ==============
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ============== 前端 SPA (Vue3 + Vite, vue-router history) ==============
    location = / {
        root   /usr/share/nginx/html;
        try_files /index-mini.html /index.html;
    }
    location / {
        root   /usr/share/nginx/html;
        index  index-mini.html index.html;
        # SPA fallback: vue-router history 模式刷新不 404
        try_files $uri $uri/ /index-mini.html /index.html;
    }

    # 静态资源 1 天缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Service Worker (PWA) - 不能缓存
    location = /sw.js {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # H2 控制台 (开发调试, 生产建议禁用)
    location /h2-console/ {
        proxy_pass http://ai_service/;
    }

    # ============== 后端 API 代理 ==============
    # Auth 服务
    location /api/v1/auth/ {
        proxy_pass         http://auth_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # AI 服务
    location /api/v1/ai/ {
        proxy_pass         http://ai_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;  # AI 可能慢
        proxy_read_timeout 120s;
    }

    # API 网关 (其他业务)
    location /api/v1/ {
        proxy_pass         http://gateway_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 兼容旧路径
    location /api/ {
        proxy_pass         http://gateway_service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # 错误页
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
