# ============================================================
# MiniMax Platform V3.5.5+ Nginx 配置
# 单端口 80 入口, 反向代理到 5 个后端微服务
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 后端服务 upstream
    upstream auth_service   { server auth:8081;      keepalive 16; }
    upstream ai_service     { server ai:8094;        keepalive 16; }
    upstream gateway_service{ server gateway:7080;   keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        # 健康检查
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # 前端静态资源
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 鉴权服务 (auth)
        location /api/auth/ {
            proxy_pass         http://auth_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI 服务 (核心)
        location /api/v1/ai/ {
            proxy_pass         http://ai_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API 网关 (其他业务)
        location /api/ {
            proxy_pass         http://gateway_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
