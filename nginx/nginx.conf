# =============================================================
# MiniMax Platform V3.5.5+ - 宿主 Nginx 主配置 (统一单文件)
# =============================================================
# 由 nginx/install-nginx.sh 自动部署到 /etc/nginx/conf.d/minimax.conf
#
# 单端口 80 (HTTPS 443) 入口:
#   /                 → /usr/share/nginx/html  (前端 Vue3 SPA)
#   /healthz          → ok
#   /api/v1/{module}/* → 16 个后端微服务
#   /ws/              → ws:8095 WebSocket
#   /sse/             → ai:8094 SSE 流式
#   /h2-console/      → ai:8094 H2 控制台 (开发)
#
# ⚠️  设计: upstream 块和 server 块在同一个文件 (避免 include 循环)
#   nginx include 默认不防重, 多 conf.d 互相 include 同一文件会重复定义
# =============================================================

# ============== 后端 upstream 块 (16 个服务) ==============
# 由 install-nginx.sh 自动注入 (扫描 backend/minimax-*)

# 鉴权服务 (auth) - 端口 8081
upstream auth_service {
    server 127.0.0.1:8081;
    keepalive 32;
}

# AI 服务 (核心) - 端口 8094
upstream ai_service {
    server 127.0.0.1:8094;
    keepalive 32;
}

# 业务网关 (gateway) - 端口 7080
upstream gateway_service {
    server 127.0.0.1:7080;
    keepalive 32;
}

# 业务服务
upstream chat_service      { server 127.0.0.1:8082; keepalive 16; }
upstream memory_service    { server 127.0.0.1:8083; keepalive 16; }
upstream model_service     { server 127.0.0.1:8084; keepalive 16; }
upstream rag_service       { server 127.0.0.1:8085; keepalive 16; }
upstream function_service  { server 127.0.0.1:8086; keepalive 16; }
upstream multimodal_service{ server 127.0.0.1:8087; keepalive 16; }
upstream agent_service     { server 127.0.0.1:8088; keepalive 16; }
upstream monitor_service   { server 127.0.0.1:8089; keepalive 16; }
upstream admin_service     { server 127.0.0.1:8090; keepalive 16; }
upstream prompt_service    { server 127.0.0.1:8091; keepalive 16; }
upstream analytics_service { server 127.0.0.1:8092; keepalive 16; }
upstream pipeline_service  { server 127.0.0.1:8093; keepalive 16; }
upstream ws_service        { server 127.0.0.1:8095; keepalive 32; }

# ============== HTTP 服务 ==============
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index-mini.html;

    # 性能 + 上传
    client_max_body_size 50M;
    client_header_buffer_size 16k;
    client_body_buffer_size 128k;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # 日志
    access_log /var/log/nginx/minimax-access.log;
    error_log  /var/log/nginx/minimax-error.log warn;

    # ============== 安全 headers (全部内联) ==============
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防止 MIME 嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # XSS 保护
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    # Permissions
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # ============== 健康检查 ==============
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ============== 前端 SPA (vue-router history) ==============
    location = / {
        try_files /index-mini.html /index.html;
    }

    location / {
        try_files $uri $uri/ /index-mini.html /index.html;
    }

    # 静态资源 1 天缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|mp4|webm)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        try_files $uri =404;
    }

    # Service Worker (PWA)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /manifest.json { expires 1d; }

    # ============== H2 控制台 (开发) ==============
    location /h2-console/ {
        proxy_pass http://ai_service/;
        proxy_set_header Host $host;
    }

    # ============== WebSocket ==============
    location /ws/ {
        proxy_pass http://ws_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============== SSE (AI 流式) ==============
    location /sse/ {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Accel-Buffering no;
    }

    # ============== 通用代理 header 复用 ==============
    # 大部分 location 都需要相同 header, 用 named location 复用
    # 注: nginx 不支持宏, 这里还是重复写

    # ============== 鉴权服务 ==============
    location /api/v1/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============== AI 服务 (核心) ==============
    location /api/v1/ai/ {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ============== 业务服务 ==============
    location /api/v1/chat/      { proxy_pass http://chat_service;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/memory/    { proxy_pass http://memory_service;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/model/     { proxy_pass http://model_service;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/rag/       { proxy_pass http://rag_service;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/function/  { proxy_pass http://function_service;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/multimodal/{ proxy_pass http://multimodal_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; client_max_body_size 200M; }
    location /api/v1/agent/     { proxy_pass http://agent_service;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/monitor/   { proxy_pass http://monitor_service;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/admin/     { proxy_pass http://admin_service;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/prompt/    { proxy_pass http://prompt_service;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/analytics/ { proxy_pass http://analytics_service;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/pipeline/  { proxy_pass http://pipeline_service;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_send_timeout 300s; proxy_read_timeout 300s; }
    location /api/v1/ws/        { proxy_pass http://ws_service;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }
    location /api/v1/gateway/   { proxy_pass http://gateway_service;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_http_version 1.1; proxy_set_header Connection ""; }

    # ============== API 兜底 ==============
    location /api/ {
        proxy_pass http://gateway_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== Gzip ==============
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml image/x-icon;

    # ============== 错误页 ==============
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
