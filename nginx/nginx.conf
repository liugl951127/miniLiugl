# =============================================================
# MiniMax Platform V3.5.5+ - 宿主 Nginx 主配置
# =============================================================
# 由 nginx/install-nginx.sh 自动部署到 /etc/nginx/conf.d/minimax.conf
#
# 单端口 80 (HTTPS 443) 入口:
#   /                 → /usr/share/nginx/html  (前端 Vue3 SPA)
#   /healthz          → ok
#   /api/v1/{module}/* → 16 个后端微服务
#   /ws/              → ws:8095 WebSocket
#   /sse/             → ai:8094 SSE 流式
#   /h2-console/      → ai:8094 H2 控制台 (开发)
#
# 设计原则:
#   - 单端口 80 入口, 防火墙只开 80/443
#   - 16 微服务独立 upstream, keepalive 复用连接
#   - vue-router history 模式 SPA fallback
#   - AI 流式接口用 SSE (无缓冲)
#   - WebSocket 升级 (Upgrade/Connection 头)
#   - Gzip + 静态资源缓存
# =============================================================

# ============== 后端 upstream (自动生成) ==============
include /etc/nginx/conf.d/minimax-upstream.conf;

# ============== 安全 headers ==============
include /etc/nginx/conf.d/minimax-security.conf;

# ============== HTTP 服务 ==============
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 根目录 (前端 dist)
    root /usr/share/nginx/html;
    index index.html index-mini.html;

    # 上传文件大小
    client_max_body_size 50M;
    client_max_header_size 16k;
    client_body_buffer_size 128k;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # 隐藏 nginx 版本

    # 日志
    access_log /var/log/nginx/minimax-access.log;
    error_log  /var/log/nginx/minimax-error.log warn;

    # ============== 通用 location 变量 ==============
    # 通用代理 header 设置 (通过 include 复用)
    # 见下方每个 location

    # ============== 健康检查 ==============
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ============== 前端 SPA (Vue3 + Vite, vue-router history) ==============
    # 优先返回 index-mini.html (精简控制台), 退回 index.html (完整 Vue SPA)
    location = / {
        try_files /index-mini.html /index.html;
    }

    # SPA 路由 fallback: 任何不存在的路径都返回 index.html (vue-router history 模式)
    location / {
        try_files $uri $uri/ /index-mini.html /index.html;
    }

    # 静态资源 1 天缓存 (js/css/png/svg/woff 等)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|mp4|webm)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        try_files $uri =404;
    }

    # Service Worker (PWA) - 不能缓存, 否则更新不及时
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # favicon / manifest
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /manifest.json { expires 1d; }

    # ============== H2 控制台 (开发调试, 生产建议禁用) ==============
    location /h2-console/ {
        proxy_pass http://ai_service/;
        proxy_set_header Host $host;
    }

    # ============== WebSocket (实时通信) ==============
    location /ws/ {
        proxy_pass http://ws_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # WS 长连接 1 小时
        proxy_send_timeout 3600s;
    }

    # ============== SSE (Server-Sent Events, AI 流式输出) ==============
    location /sse/ {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;          # SSE 不能缓冲
        proxy_cache off;
        proxy_read_timeout 600s;      # SSE 长连接 10 分钟
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Accel-Buffering no;  # 禁用 nginx 缓冲
    }

    # ============== 鉴权服务 (auth) ==============
    location /api/v1/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============== AI 服务 (核心) ==============
    location /api/v1/ai/ {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;   # AI 可能慢
        proxy_read_timeout 120s;
    }

    # ============== 业务网关 (其他业务 API 兜底) ==============
    location /api/v1/gateway/ {
        proxy_pass http://gateway_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 1: chat ==============
    location /api/v1/chat/ {
        proxy_pass http://chat_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 2: memory ==============
    location /api/v1/memory/ {
        proxy_pass http://memory_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 3: model ==============
    location /api/v1/model/ {
        proxy_pass http://model_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 4: rag ==============
    location /api/v1/rag/ {
        proxy_pass http://rag_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 5: function ==============
    location /api/v1/function/ {
        proxy_pass http://function_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 6: multimodal ==============
    location /api/v1/multimodal/ {
        proxy_pass http://multimodal_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 200M;  # 多模态文件大
    }

    # ============== 业务服务 7: agent ==============
    location /api/v1/agent/ {
        proxy_pass http://agent_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 8: monitor ==============
    location /api/v1/monitor/ {
        proxy_pass http://monitor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 9: admin ==============
    location /api/v1/admin/ {
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 10: prompt ==============
    location /api/v1/prompt/ {
        proxy_pass http://prompt_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 11: analytics ==============
    location /api/v1/analytics/ {
        proxy_pass http://analytics_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== 业务服务 12: pipeline ==============
    location /api/v1/pipeline/ {
        proxy_pass http://pipeline_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_send_timeout 300s;  # 训练可能慢
        proxy_read_timeout 300s;
    }

    # ============== API 兜底 (未匹配 → gateway) ==============
    location /api/ {
        proxy_pass http://gateway_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ============== Gzip 压缩 ==============
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ============== 错误页 ==============
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;  # 只能内部访问
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
