# =============================================================
# MiniMax Platform - 后端服务 upstream (V3.5.5+ 宿主 nginx 用)
# 由 nginx/install-nginx.sh 自动部署到 /etc/nginx/conf.d/minimax-upstream.conf
#
# 注意: nginx 在宿主机, 后端在 Docker 容器
#       Docker 容器需要把端口暴露到 0.0.0.0 (不是 127.0.0.1)
#       这样宿主机 nginx 才能通过 127.0.0.1:port 访问到容器内服务
# =============================================================

# 鉴权服务 (auth) - 端口 8081
upstream auth_service {
    server 127.0.0.1:8081;
    keepalive 16;
}

# AI 服务 (核心) - 端口 8094
upstream ai_service {
    server 127.0.0.1:8094;
    keepalive 16;
}

# API 网关 (其他业务) - 端口 7080
upstream gateway_service {
    server 127.0.0.1:7080;
    keepalive 16;
}
