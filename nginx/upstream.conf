# =============================================================
# MiniMax Platform - 16 个后端服务 upstream
# =============================================================
# 由 scripts/gen-nginx-config.sh 扫描 backend/minimax-* 自动生成
# 重新生成: bash scripts/gen-nginx-config.sh
#
# 注意: nginx 在宿主机, 后端在 Docker 容器
#       容器端口必须暴露 0.0.0.0 (不是 127.0.0.1)
#       这样宿主机 nginx 才能通过 127.0.0.1:port 访问容器内服务
# =============================================================

# 鉴权服务 (auth) - 端口 8081 - 用户鉴权 / RBAC
upstream auth_service {
    server 127.0.0.1:8081;
    keepalive 32;
    keepalive_timeout 60s;
}

# AI 服务 (核心) - 端口 8094 - AI 核心 (意图/知识库/Spark)
upstream ai_service {
    server 127.0.0.1:8094;
    keepalive 32;
    keepalive_timeout 60s;
}

# 业务网关 (gateway) - 端口 7080 - 业务聚合
upstream gateway_service {
    server 127.0.0.1:7080;
    keepalive 32;
    keepalive_timeout 60s;
}

# 业务服务 1: chat - 端口 8082 - 会话 + 消息
upstream chat_service {
    server 127.0.0.1:8082;
    keepalive 16;
}

# 业务服务 2: memory - 端口 8083 - 长期记忆
upstream memory_service {
    server 127.0.0.1:8083;
    keepalive 16;
}

# 业务服务 3: model - 端口 8084 - 模型管理 + Battle
upstream model_service {
    server 127.0.0.1:8084;
    keepalive 16;
}

# 业务服务 4: rag - 端口 8085 - RAG 检索
upstream rag_service {
    server 127.0.0.1:8085;
    keepalive 16;
}

# 业务服务 5: function - 端口 8086 - Function Call
upstream function_service {
    server 127.0.0.1:8086;
    keepalive 16;
}

# 业务服务 6: multimodal - 端口 8087 - 多模态
upstream multimodal_service {
    server 127.0.0.1:8087;
    keepalive 16;
}

# 业务服务 7: agent - 端口 8088 - Agent 自主任务
upstream agent_service {
    server 127.0.0.1:8088;
    keepalive 16;
}

# 业务服务 8: monitor - 端口 8089 - 监控 + 告警
upstream monitor_service {
    server 127.0.0.1:8089;
    keepalive 16;
}

# 业务服务 9: admin - 端口 8090 - 后台管理
upstream admin_service {
    server 127.0.0.1:8090;
    keepalive 16;
}

# 业务服务 10: prompt - 端口 8091 - 提示词管理
upstream prompt_service {
    server 127.0.0.1:8091;
    keepalive 16;
}

# 业务服务 11: analytics - 端口 8092 - 数据分析
upstream analytics_service {
    server 127.0.0.1:8092;
    keepalive 16;
}

# 业务服务 12: pipeline - 端口 8093 - 训练流水线
upstream pipeline_service {
    server 127.0.0.1:8093;
    keepalive 16;
}

# 业务服务 13: ws - 端口 8095 - WebSocket
upstream ws_service {
    server 127.0.0.1:8095;
    keepalive 32;
}
