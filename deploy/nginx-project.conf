# =============================================================
# MiniMax Platform V3.5.8+ 项目级 Nginx 配置
# 
# 用途: 整个项目作为上游, 部署到 K8s/云平台时使用
# 入口域名: minimax.example.com
# 
# 与 nginx-host.conf 区别:
#   - host.conf: 监听宿主机 80, 转发到 localhost:port
#   - project.conf: 监听公网 80/443, 转发到 K8s Service
# =============================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/minimax-error.log warn;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/minimax-access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;
    large_client_header_buffers 4 16k;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml
        application/vnd.ms-fontobject
        application/x-font-ttf font/opentype;

    # 限流 (单 IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============== 上游 (K8s Service / Docker 网络) ==============
    upstream minimax_gateway {
        server minimax-gateway:7080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream minimax_auth {
        server minimax-auth:8081 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream minimax_ai {
        server minimax-ai:8094 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream minimax_admin {
        server minimax-admin:8090 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream minimax_monitor {
        server minimax-monitor:8089 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # ============== HTTP → HTTPS 重定向 ==============
    server {
        listen 80;
        server_name minimax.example.com;
        return 301 https://$host$request_uri;
    }

    # ============== HTTPS 主服务 ==============
    server {
        listen 443 ssl http2;
        server_name minimax.example.com;

        # SSL 证书 (Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/minimax.crt;
        ssl_certificate_key /etc/nginx/ssl/minimax.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 健康检查
        location = /health {
            access_log off;
            return 200 "MiniMax Platform UP\n";
        }

        # 登录限流
        location ~ ^/api/v1/auth/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://minimax_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API 限流
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 100;
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # AI 路由
        location /ai/ {
            proxy_pass http://minimax_ai;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # SSE
        location /sse/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # 前端
        root /var/www/minimax/dist;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
