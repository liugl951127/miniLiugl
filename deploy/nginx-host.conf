# =============================================================
# MiniMax Platform V3.5.8+ Nginx 宿主机配置
# 监听 80, 反向代理 17 微服务
#
# 安装:
#   sudo cp deploy/nginx-host.conf /etc/nginx/nginx.conf
#   sudo systemctl restart nginx
#
# 验证:
#   curl -I http://localhost/health
# =============================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/minimax-error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut=$upstream_response_time';
    access_log /var/log/nginx/minimax-access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50M;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype;

    # ============== 上游服务 (17 微服务) ==============
    upstream minimax_gateway {
        server 127.0.0.1:7080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream minimax_auth {
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream minimax_ai {
        server 127.0.0.1:8094 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream minimax_admin {
        server 127.0.0.1:8090 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    upstream minimax_monitor {
        server 127.0.0.1:8089 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }

    # ============== 主服务器 (端口 80) ==============
    server {
        listen 80 default_server;
        server_name _;

        # 健康检查
        location = /health {
            access_log off;
            return 200 "MiniMax Platform V3.5.8+ UP\n";
            add_header Content-Type text/plain;
        }

        # 健康检查 JSON (详细)
        location = /health/json {
            access_log off;
            default_type application/json;
            return 200 '{"status":"UP","platform":"MiniMax","version":"V3.5.8+"}';
        }

        # 后端 API - Gateway 统一入口
        location /api/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # 认证服务直连
        location /auth/ {
            proxy_pass http://minimax_auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI 服务直连 (大数据/流式)
        location /ai/ {
            proxy_pass http://minimax_ai;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Admin 管理后台直连
        location /admin/ {
            proxy_pass http://minimax_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 监控 (Prometheus / actuator)
        location /monitor/ {
            proxy_pass http://minimax_monitor;
            proxy_set_header Host $host;
        }

        # Actuator 健康
        location /actuator/ {
            proxy_pass http://minimax_gateway;
            proxy_set_header Host $host;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # SSE 流
        location /sse/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # 前端 SPA (Vue 3 编译产物)
        root /var/www/minimax/dist;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # 静态资源 (1 年缓存)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 错误页
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
