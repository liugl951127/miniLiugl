# MiniMax Platform V3.5.8+ Nginx 反向代理
# 监听 80, 转发到 7080 gateway

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    upstream minimax-gateway {
        server minimax-gateway:7080;
        keepalive 32;
    }

    upstream minimax-ai {
        server minimax-ai:8094;
        keepalive 8;
    }

    upstream minimax-auth {
        server minimax-auth:8081;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # 根路径 - 前端 SPA
        location / {
            # 本地构建的前端 (如挂载了)
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # 防止缓存
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # 后端 API - 走 gateway
        location /api/ {
            proxy_pass http://minimax-gateway/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://minimax-gateway/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
