# Prometheus 监控配置（占位，Day 12 启用）
# 届时会在各应用服务暴露 /actuator/prometheus 端点
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'minimax-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['minimax-gateway:8080']
        labels: { service: 'gateway' }
  - job_name: 'minimax-auth'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['minimax-auth:8081']
        labels: { service: 'auth' }
