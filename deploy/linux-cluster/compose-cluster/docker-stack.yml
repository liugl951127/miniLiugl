version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: MinMax2026!
      MYSQL_DATABASE: minimax
      MYSQL_USER: minimax
      MYSQL_PASSWORD: MinMax2026!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - minimax-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "MinMax2026!"]
    networks:
      - minimax-net
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G

  auth:
    image: localhost:5000/minimax-auth:v1.0.0
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minimax?useUnicode=true
      SPRING_DATASOURCE_PASSWORD: MinMax2026!
      MINIMAX_JWT_SECRET: please-change-this-secret
    networks:
      - minimax-net
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chat:
    image: localhost:5000/minimax-chat:v1.0.0
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_PASSWORD: MinMax2026!
      SPRING_DATA_REDIS_HOST: redis
    networks:
      - minimax-net
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G

  model:
    image: localhost:5000/minimax-model:v1.0.0
    networks:
      - minimax-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  memory:
    image: localhost:5000/minimax-memory:v1.0.0
    networks:
      - minimax-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  rag:
    image: localhost:5000/minimax-rag:v1.0.0
    networks:
      - minimax-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  gateway:
    image: localhost:5000/minimax-gateway:v1.0.0
    ports:
      - "80:8080"
    networks:
      - minimax-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

networks:
  minimax-net:
    driver: overlay
    attachable: true

volumes:
  mysql_data:
