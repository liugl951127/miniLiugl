version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: MinMax2026!
      MYSQL_DATABASE: minimax
      MYSQL_USER: minimax
      MYSQL_PASSWORD: MinMax2026!
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "MinMax2026!"]
    ports:
      - "6379:6379"

  auth:
    image: localhost:5000/minimax-auth:v1.0.0
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minimax?useUnicode=true
      SPRING_DATASOURCE_PASSWORD: MinMax2026!
    ports:
      - "8081:8081"
    deploy:
      replicas: 2

  chat:
    image: localhost:5000/minimax-chat:v1.0.0
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_PASSWORD: MinMax2026!
    ports:
      - "8082:8082"
    deploy:
      replicas: 2

  model:
    image: localhost:5000/minimax-model:v1.0.0
    ports:
      - "8083:8083"
    deploy:
      replicas: 2

  memory:
    image: localhost:5000/minimax-memory:v1.0.0
    ports:
      - "8084:8084"
    deploy:
      replicas: 2

  rag:
    image: localhost:5000/minimax-rag:v1.0.0
    ports:
      - "8085:8085"
    deploy:
      replicas: 2

  gateway:
    image: localhost:5000/minimax-gateway:v1.0.0
    ports:
      - "80:8080"
    deploy:
      replicas: 2

volumes:
  mysql_data:
