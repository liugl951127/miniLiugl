apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minimax-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: minimax.local
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-svc
                port:
                  number: 8081
          - path: /api/v1/sessions
            pathType: Prefix
            backend:
              service:
                name: chat-svc
                port:
                  number: 8082
          - path: /api/v1/models
            pathType: Prefix
            backend:
              service:
                name: model-svc
                port:
                  number: 8083
          - path: /api/v1/memory
            pathType: Prefix
            backend:
              service:
                name: memory-svc
                port:
                  number: 8084
          - path: /api/v1/rag
            pathType: Prefix
            backend:
              service:
                name: rag-svc
                port:
                  number: 8085
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
