apiVersion: v1
kind: Service
metadata:
  name: model-svc
spec:
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: model
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model
  labels:
    app.kubernetes.io/part-of: minimax
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model
  template:
    metadata:
      labels:
        app: model
        app.kubernetes.io/part-of: minimax
    spec:
      containers:
        - name: model
          image: localhost:5000/minimax-model:v1.0.0
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-svc:3306/minimax?useUnicode=true&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              value: minimax
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: mysql-password
            - name: SPRING_DATA_REDIS_HOST
              value: redis-svc
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: redis-password
            - name: MINIMAX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/v1/model/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
