apiVersion: v1
kind: Service
metadata:
  name: memory-svc
spec:
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: memory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory
  labels:
    app.kubernetes.io/part-of: minimax
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memory
  template:
    metadata:
      labels:
        app: memory
        app.kubernetes.io/part-of: minimax
    spec:
      containers:
        - name: memory
          image: localhost:5000/minimax-memory:v1.0.0
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8084"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-svc:3306/minimax?useUnicode=true&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              value: minimax
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: mysql-password
            - name: SPRING_DATA_REDIS_HOST
              value: redis-svc
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: redis-password
            - name: MINIMAX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/v1/memory/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
