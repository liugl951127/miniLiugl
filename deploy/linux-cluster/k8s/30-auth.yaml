apiVersion: v1
kind: Service
metadata:
  name: auth-svc
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: auth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app.kubernetes.io/part-of: minimax
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        app.kubernetes.io/part-of: minimax
    spec:
      containers:
        - name: auth
          image: localhost:5000/minimax-auth:v1.0.0
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-svc:3306/minimax?useUnicode=true&characterEncoding=utf8
            - name: SPRING_DATASOURCE_USERNAME
              value: minimax
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: mysql-password
            - name: MINIMAX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minimax-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "384Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "1500m"
