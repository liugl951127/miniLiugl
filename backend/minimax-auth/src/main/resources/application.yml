server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: minimax-auth
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: jdbc:mysql://localhost:3306/minimax?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

minimax:
  jwt:
    secret: ${JWT_SECRET:minimax-default-secret-please-override-in-production-32+}
    access-ttl-seconds: 1800        # 30 min
    refresh-ttl-seconds: 604800     # 7 days
    issuer: minimax-platform

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.minimax.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: AUTO

logging:
  level:
    com.minimax: DEBUG
    org.springframework.security: INFO
