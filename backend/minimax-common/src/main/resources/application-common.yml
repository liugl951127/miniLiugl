# =============================================================
# MiniMax 公共配置 (V5.4 + V5.5 gateway 适配)
# 各微服务通过 spring.config.import 引入此文件
#
# 注意: 不包含 minimax: 顶层 / 不包含 datasource (gateway 不需要)
# =============================================================

server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 200
    max-connections: 10000
    connection-timeout: 20s
    keep-alive-timeout: 60s

spring:
  # ===== 公共 Jackson 配置 =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  # ===== 公共文件上传 =====
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

  # ===== 公共生命周期 =====
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ===== 公共日志 =====
logging:
  level:
    root: INFO
    com.minimax: DEBUG
    org.springframework.web: INFO
  pattern:
    # V5.8 加 traceId (由 gateway TraceFilter 注入 MDC)
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [traceId=%X{traceId:-}] %logger{36} - %msg%n"

# ===== V5.10 Actuator / Prometheus / Micrometer (各微服务统一) =====
# 启用 health / metrics / prometheus 端点 (供 Prometheus 抓取 + Grafana 展示)
management:
  endpoints:
    web:
      exposure:
        # V5.10: 默认暴露 health/info/metrics/prometheus
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized  # 只对已登录用户暴露详情
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    tags:
      # V5.10: 每个微服务的 metrics 自动带 application 标签 (便于 Grafana 按服务分组)
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        minimax.llm.latency: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99
        minimax.llm.latency: 0.5, 0.75, 0.95, 0.99
  prometheus:
    metrics:
      export:
        enabled: true
        step: 10s  # Prometheus 抓取间隔 (10s)
        descriptions: true
# ===== V5.11 Swagger / Knife4j 统一配置 (下沉到 common) =====
# 13 个微服务统一启用, 文档中心通过 /monitor/api-docs 聚合
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.minimax
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表
