# =============================================================
# MySQL 生产模式 (V3.5.5+ 统一注入)
# - 标准 MySQL/MariaDB JDBC Driver
# - 配合 docker-compose 或外部 MySQL 部署
# - 用法: java -jar minimax-X.jar --spring.profiles.active=mysql
# =============================================================

server:
  port: ${SERVER_PORT:0}   # 由各服务 application.yml 默认值覆盖

# 关闭 OTEL exporter (避免连 localhost:4318 失败)
otel:
  metrics:
    exporter: none
  traces:
    exporter: none
  logs:
    exporter: none
  # 关掉 javaagent 自动 attach
  java:
    global-autoconfigure:
      enabled: false

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:minimax_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  sql:
    init:
      mode: never   # 生产环境不要自动跑 schema

# 关闭 OTEL tracing (避免 OTLP endpoint 报错)
management:
  tracing:
    enabled: false
  otlp:
    tracing:
      endpoint: ''

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:minimax_redis_2024}
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
  cloud:
    nacos:
      discovery:
        enabled: false   # 直连 MySQL/Redis, 不走 Nacos
      config:
        enabled: false

# MyBatis-Plus (MySQL 启用下划线映射)
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
      column-underline: true

logging:
  level:
    com.minimax: INFO
    com.alibaba.nacos: WARN
    org.springframework.cloud: WARN
    com.zaxxer.hikari: WARN

# V3.5.8: 自动加载种子数据
spring.sql.init.mode: always
spring.sql.init.schema-locations: classpath:complete.sql
spring.sql.init.data-locations: classpath:seed-data.sql
spring.sql.init.continue-on-error: false
