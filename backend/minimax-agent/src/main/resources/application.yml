# =============================================================
# agent 模块配置 (V5.4 重构后)
# 公共配置在 application-common.yml, 这里只放模块特有配置
# =============================================================

server:
  port: 8090
  servlet:
    context-path: /api/v1

spring:
  config:
    import: classpath:application-common.yml
  application:
    name: minimax-agent
  profiles:
    active: dev

# 模块特殊配置 (保留原 minimax.* 块)
minimax:
agent:
  max-rounds: 8
  base-url: ${MODEL_BASE_URL:http://localhost:8083}
  model: ${MODEL_NAME:MiniMax-Text-01}
  token: ${MODEL_TOKEN:}
