server:
  port: 8086
  servlet:
    context-path: /api/v1

spring:
  application:
    name: minimax-function-test
  datasource:
    url: jdbc:h2:mem:minimax;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

minimax:
  jwt:
    secret: test-secret-key-1234567890-abcdef-min-32-bytes-for-jwt-hs256
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    issuer: minimax-platform
  function:
    max-rounds: 5
    chat:
      model: mock
      base-url: http://localhost:8083
      token: ""
      timeout-seconds: 5

logging:
  level:
    com.minimax: DEBUG
