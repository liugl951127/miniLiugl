# =============================================================
# admin 模块配置 (V5.4 重构后)
# 公共配置在 application-common.yml, 这里只放模块特有配置
# =============================================================

server:
  port: 8087
  servlet:
    context-path: /api/v1

spring:
  config:
    import: classpath:application-common.yml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/minimax_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:minimax}
    password: ${MYSQL_PASSWORD:minimax_pass_2024}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:minimax_redis_2024}
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        id-type: ASSIGN_ID
        logic-delete-field: deleted
    mapper-locations: classpath*:mapper/**/*.xml
  application:
    name: minimax-admin
  profiles:
    active: dev

# 模块特殊配置 (保留原 minimax.* 块)
minimax:
  # (无特殊配置)
