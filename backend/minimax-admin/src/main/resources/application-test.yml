server:
  port: 8087
  servlet:
    context-path: /api/v1

spring:
  application:
    name: minimax-admin-test
  datasource:
    url: jdbc:h2:mem:minimax;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

minimax:
  jwt:
    secret: test-secret-key-1234567890-abcdef-min-32-bytes-for-jwt-hs256
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    issuer: minimax-platform
  admin:
    timeout-seconds: 3
    service-token: ""
    services:
      auth: http://localhost:8081
      chat: http://localhost:8082
      model: http://localhost:8083
      memory: http://localhost:8084
      rag: http://localhost:8085
      function: http://localhost:8086

logging:
  level:
    com.minimax: DEBUG
