server:
  port: 8085
  servlet:
    context-path: /api/v1

spring:
  application:
    name: minimax-rag-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:minimax;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minimax:
  jwt:
    secret: test-secret-key-1234567890-abcdef-min-32-bytes-for-jwt-hs256
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    issuer: minimax-platform
  rag:
    chunk:
      size: 500
      overlap: 50
    embedding:
      provider: mock
      dim: 64
    retrieve:
      min-score: 0.10
    chat:
      model: mock
      base-url: http://localhost:8083
      token: ""

logging:
  level:
    com.minimax: DEBUG
