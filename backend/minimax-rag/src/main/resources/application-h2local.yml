# =============================================================
# H2 沙箱模式 (V3.5.3+ 统一注入)
# - 不依赖 MariaDB/Redis/Nacos
# - 启动自动跑 schema-h2.sql
# - 用法: --spring.profiles.active=h2local
# =============================================================

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:minimax_rag;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 50ms
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    refresh:
      enabled: false

# MyBatis-Plus H2 兼容
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      table-underline: false
      column-underline: false

logging:
  level:
    root: WARN
    com.minimax: INFO
    org.springframework: WARN
