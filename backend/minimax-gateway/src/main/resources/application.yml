server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: minimax-platform
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/minimax_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

minimax:
  jwt:
    secret: ${JWT_SECRET:minimax_jwt_secret_key_2024_at_least_32_bytes_long_xxxxxxxx}
    expire-minutes: 10080  # 7 天
    refresh-expire-minutes: 43200  # 30 天
    header: Authorization
    prefix: "Bearer "
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://127.0.0.1:5173
    allowed-methods: "*"
    allowed-headers: "*"
    allow-credentials: true
  upload:
    base-dir: ${UPLOAD_DIR:./data/upload}
    max-size-mb: 100
  minio:
    enabled: false  # Day 11 启用
    endpoint: http://127.0.0.1:9000
    access-key: minimax_admin
    secret-key: minimax_minio_2024
    bucket: minimax-files

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: false
  basic:
    enable: false

logging:
  level:
    root: INFO
    com.minimax: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
