# =============================================================
# MiniMax Gateway 配置 (V5.5 + V5.7)
# 公共配置在 application-common.yml
# =============================================================

# V1.9: gateway 端口改为 7080 (不占用 8080, 避免与其它服务冲突)
server:
  port: ${SERVER_PORT:7080}

spring:
  config:
    import: classpath:application-common.yml
  application:
    name: minimax-gateway
  profiles:
    active: dev
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:minimax_redis_2024}
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 16

# =============================================================
# Spring Cloud Gateway 路由 (V5.5)
# V5.7: uri 从 http://127.0.0.1:{port} 改为 lb://minimax-{module} (Nacos LoadBalancer)
# =============================================================
spring.cloud.gateway:
  discovery:
    locator:
      enabled: false              # 不自动发现, 显式声明路由

  globalcors:
    cors-configurations:
      '[/**]':
        allowed-origin-patterns:
          - http://localhost*
          - http://127.0.0.1*
          - https://*.your-domain.com
        allowed-methods: "*"
        allowed-headers: "*"
        exposed-headers:
          - X-Trace-Id
          - X-User-Id
        allow-credentials: true
        max-age: 3600

  default-filters:
    - DedupeResponseHeader=Access-Control-Allow-Origin
    - AddRequestHeader=X-Request-Source, gateway
    - AddResponseHeader=X-Response-Source, minimax-gateway
    # V5.7 熔断降级: 每个路由单独配 fallbackUri
    # 注: gateway 默认 filter 用 Spring Cloud CircuitBreaker (不是 resilience4j), 需要 spring-cloud-circuitbreaker
    # 这里用 fallback controller (lb 失败 / 5xx 时 fallbackUri: forward:/fallback)

  routes:
    # ============== 前台业务 (按模块) — V5.7 lb:// Nacos LoadBalancer ==============
    - id: auth
      uri: lb://minimax-auth
      predicates:
        - Path=/api/v1/auth/**,/api/auth/**
      filters:
        - StripPrefix=2
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            key-resolver: "#{@userKeyResolver}"

    - id: chat
      uri: lb://minimax-chat
      predicates:
        - Path=/api/v1/chat/**,/api/v1/sessions/**,/api/v1/messages/**
      filters:
        - StripPrefix=2
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"

    - id: model
      uri: lb://minimax-model
      predicates:
        - Path=/api/v1/model/**,/api/v1/models/**,/api/v1/test/**,/api/v1/openai/**,/api/v1/imagegen/**,/api/v1/audio/**,/api/v1/leaderboard/**
      filters:
        - StripPrefix=2

    - id: memory
      uri: lb://minimax-memory
      predicates:
        - Path=/api/v1/memory/**
      filters:
        - StripPrefix=2

    - id: rag
      uri: lb://minimax-rag
      predicates:
        - Path=/api/v1/rag/**
      filters:
        - StripPrefix=2

    - id: function
      uri: lb://minimax-function
      predicates:
        - Path=/api/v1/function/**
      filters:
        - StripPrefix=2

    - id: multimodal
      uri: lb://minimax-multimodal
      predicates:
        - Path=/api/v1/multimodal/**,/api/v1/multi/**
      filters:
        - StripPrefix=2

    - id: monitor
      uri: lb://minimax-monitor
      predicates:
        - Path=/api/v1/monitor/**
      filters:
        - StripPrefix=2

    - id: agent
      uri: lb://minimax-agent
      predicates:
        - Path=/api/v1/agent/**
      filters:
        - StripPrefix=2
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@userKeyResolver}"

    - id: prompt
      uri: lb://minimax-prompt
      predicates:
        - Path=/api/v1/prompt/**,/api/v1/prompts/**
      filters:
        - StripPrefix=2

    - id: analytics
      uri: lb://minimax-analytics
      predicates:
        - Path=/api/v1/analytics/**
      filters:
        - StripPrefix=2

    # V1.9.1: V5.32 画布工作流路由
    - id: pipeline
      uri: lb://minimax-pipeline
      predicates:
        - Path=/api/v1/pipeline/**
      filters:
        - StripPrefix=2

    - id: ws
      uri: lb:ws://minimax-ws
      predicates:
        - Path=/api/v1/ws/**,/ws/**
      filters:
        - StripPrefix=2

    # ============== 后台管理 ==============
    - id: admin
      uri: lb://minimax-admin
      predicates:
        - Path=/api/v1/admin/**,/admin/**
      filters:
        - StripPrefix=2
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            key-resolver: "#{@userKeyResolver}"

# =============================================================
# Nacos 服务发现 (V5.7)
# =============================================================
spring.cloud.nacos:
  discovery:
    server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
    namespace: ${NACOS_NS:minimax-dev}
    username: ${NACOS_USER:nacos}
    password: ${NACOS_PASS:nacos}
    register-enabled: true       # gateway 也注册到 nacos
    metadata:
      version: 5.7.0
      group: minimax

# =============================================================
# Resilience4j 熔断降级 (V5.7)
# =============================================================
resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      failureRateThreshold: 50
      waitDurationInOpenState: 10s
      permittedNumberOfCallsInHalfOpenState: 3
      automaticTransitionFromOpenToHalfOpenEnabled: true
      registerHealthIndicator: true
  instances:
    default:
      baseConfig: default

resilience4j.timelimiter:
  configs:
    default:
      timeoutDuration: 5s
  instances:
    default:
      baseConfig: default

resilience4j.retry:
  configs:
    default:
      maxAttempts: 3
      waitDuration: 1s
  instances:
    default:
      baseConfig: default

# =============================================================
# 网关特有配置
# =============================================================
minimax:
  jwt:
    expire-minutes: 10080
    refresh-expire-minutes: 43200
    issuer: minimax-platform
    gateway-auth:
      enabled: true
      public-paths:
        - /api/v1/auth/login
        - /api/v1/auth/register
        - /api/v1/auth/refresh
        - /api/v1/auth/oauth
        - /api/v1/auth/wechat
        - /api/v1/health
        - /health
        - /v3/api-docs
        - /swagger-ui
        - /doc.html
        - /actuator
  cors:
    allowed-origins:
      - http://localhost
      - http://localhost:80
      - http://localhost:3000
      - http://localhost:5173
      - http://127.0.0.1
      - http://127.0.0.1:80
      - http://127.0.0.1:3000
  upload:
    base-dir: ${UPLOAD_DIR:./data/upload}
    max-size-mb: 100
  minio:
    enabled: false
    endpoint: http://127.0.0.1:9000
    access-key: minimax_admin
    secret-key: minimax_minio_2024
    bucket: minimax-files

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,refresh,routes,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    redis:
      enabled: false
    db:
      enabled: false
  metrics:
    tags:
      application: minimax-gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    com.alibaba.nacos: WARN
    com.minimax: DEBUG
    io.github.resilience4j: INFO