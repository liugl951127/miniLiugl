server:
  port: 8084
  servlet:
    context-path: /api/v1

spring:
  application:
    name: minimax-memory-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:minimax;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

minimax:
  jwt:
    secret: test-secret-key-1234567890-abcdef-min-32-bytes-for-jwt-hs256
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    issuer: minimax-platform
  memory:
    use-redis: false
    embedding:
      model: mock
      dim: 64      # mock 用 64 维 (生产建议 1536)
      base-url: http://localhost:8083
      api-key: ""
    recall:
      top-k: 5
      min-score: 0.10    # mock embedding 相似度不高，调低
    summary:
      model: mock
      base-url: http://localhost:8083
      token: ""

logging:
  level:
    com.minimax: DEBUG
    org.springframework.security: WARN
