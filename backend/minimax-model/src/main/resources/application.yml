server:
  port: 8083
  servlet:
    context-path: /api/v1

spring:
  application:
    name: minimax-model
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/minimax?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:minimax}
    password: ${DB_PASS:minimax}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

minimax:
  jwt:
    secret: ${JWT_SECRET:minimax-default-secret-please-override-in-production-32+}
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    issuer: minimax-platform
  model:
    mock-mode: false   # true → 强制所有请求走 mock adapter（无 key 演示用）

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.minimax.model.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: AUTO

logging:
  level:
    com.minimax: DEBUG
    org.springframework.security: WARN
    reactor.netty: WARN
