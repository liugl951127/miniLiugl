# =============================================================
# AI MySQL 生产模式 (V3.5.5+)
# - 标准 MySQL/MariaDB JDBC Driver
# - 配合 docker-compose 或外部 MySQL 部署
# - 用法: java -jar minimax-ai.jar --spring.profiles.active=mysql
# =============================================================

server:
  port: ${SERVER_PORT:8094}

spring:
  application:
    name: minimax-ai
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:minimax_platform}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:minimax_redis_2024}
      database: 0
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# 关闭 OTEL exporter (避免连 localhost:4318 失败)
otel:
  metrics:
    exporter: none
  traces:
    exporter: none
  logs:
    exporter: none

# 关闭 Spring Boot tracing
management:
  tracing:
    enabled: false

minimax:
  ai:
    type: transformer-small
    vocab-size: 8192
    hidden-dim: 128
    num-heads: 4
    num-layers: 2
    max-seq-len: 128
    temperature: 0.8
    top-k: 40
    top-p: 0.9
    mode: mysql
    crossModule: false
    security:
      enabled: true

# MyBatis-Plus (camelCase 列名, 不做下划线映射)
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
      column-underline: true

logging:
  level:
    com.minimax.ai: INFO
    com.alibaba.nacos: WARN
    org.springframework.cloud: WARN
    com.zaxxer.hikari: WARN

# V3.5.8: 自动加载种子数据
spring.sql.init.mode: always
spring.sql.init.schema-locations: classpath:complete.sql
spring.sql.init.data-locations: classpath:seed-data.sql
spring.sql.init.continue-on-error: false
