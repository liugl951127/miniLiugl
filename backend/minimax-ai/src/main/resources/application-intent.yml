# MiniMax 意图识别外部化配置 (V3.5.7)
# 路径: backend/minimax-ai/src/main/resources/application-intent.yml
# 加载: 自动绑定到 IntentConfig (prefix=intent)
#
# 业务运营可直接改这个文件改规则, 不重新编译.
# 配合 Nacos 配置中心可实现热更新.

intent:
  # 算法版本 (用于接口返回, 标识当前用的哪一版算法)
  algorithm: v3.5.6-weighted-voting

  # 4 模型加权投票权重
  # final_score = tf*weights[0] + ngram*weights[1] + expand*weights[2] + context*weights[3]
  # 推荐保持: 关键词 0.4 + 短语 0.3 + 同义词 0.2 + 上下文 0.1 = 1.0
  weights:
    - 0.4   # 关键词 TF
    - 0.3   # N-gram 短语
    - 0.2   # 同义词扩展
    - 0.1   # 上下文继承

  # sigmoid 置信度缩放因子 (越大差距越敏感, 越小差距越钝感)
  confidence-scale: 5.0

  # ═══════════════════════════════════════════════════════════
  # Negation 否定处理
  # ═══════════════════════════════════════════════════════════
  negation:
    scope: 5  # 否定词作用域 (字符数, 中文常用 3-5)
    prefixes:
      - 不
      - 没
      - 未
      - 别
      - 无
      - 非
      - 勿
      - 无法
      - 不能
      - no
      - not
      - never
      - without

  # ═══════════════════════════════════════════════════════════
  # 紧急度
  # ═══════════════════════════════════════════════════════════
  urgent:
    words:   # 紧急词 (基础分 ×0.3)
      - 急
      - 紧急
      - 马上
      - 立即
      - 立刻
      - 尽快
      - asap
      - urgent
      - 火
      - 爆炸
      - 故障
      - 宕机
      - 崩溃
      - 卡死
      - 卡住
    degree:  # 紧急程度副词 (额外加权 ×0.15)
      - 非常
      - 特别
      - 极其
      - 巨
      - 超
      - 超级

  # ═══════════════════════════════════════════════════════════
  # 情感分析
  # ═══════════════════════════════════════════════════════════
  sentiment:
    positive:    # 正面词
      - 好
      - 棒
      - 赞
      - 感谢
      - 谢谢
      - 满意
      - 喜欢
      - 推荐
      - 优秀
      - 完美
      - 不错
      - 给力
      - 漂亮
      - 贴心
      - 迅速
    negative:    # 负面词
      - 差
      - 烂
      - 垃圾
      - 失望
      - 愤怒
      - 投诉
      - 退款
      - 没用
      - 坏了
      - 不对
      - 错误
      - 卡顿
      - 慢
      - 渣
      - 坑
      - 忽悠
    degree-words:  # 程度副词加权 (key=词, value=系数)
      非常: 1.5
      特别: 1.5
      极其: 1.8
      巨: 1.5
      很: 1.2
      挺: 1.1
      有点: 0.7
      稍微: 0.5
      略: 0.5
      不太: 0.6

  # ═══════════════════════════════════════════════════════════
  # Agent 推荐映射 (意图 → 优先 Agent)
  # ═══════════════════════════════════════════════════════════
  agents:
    query: echo-analyzer
    order: echo-writer
    complaint: echo-reviewer
    consult: echo-translator
    cancel: echo-writer
    feedback: echo-summarizer
    pay: echo-reviewer
    login: echo-coder
    register: echo-coder

  # ═══════════════════════════════════════════════════════════
  # 关键词表 (intent -> { word -> weight })
  # 调整 weight 可改变该词对意图的影响力
  # ═══════════════════════════════════════════════════════════
  keywords:
    query:     # 查询
      查询: 10.0
      查: 8.0
      看看: 6.0
      显示: 5.0
      多少: 7.0
      几个: 5.0
      哪些: 5.0
      有没有: 6.0
      select: 5.0
      find: 5.0
      get: 4.0

    order:     # 下单
      下单: 10.0
      订购: 9.0
      买: 8.0
      购买: 9.0
      要: 5.0
      order: 8.0
      buy: 7.0
      purchase: 8.0

    complaint: # 投诉
      投诉: 10.0
      差评: 9.0
      退款: 8.0
      退货: 8.0
      complain: 8.0
      refund: 7.0

    consult:   # 咨询
      咨询: 10.0
      请问: 8.0
      问: 5.0
      怎么: 5.0
      如何: 5.0
      help: 5.0
      "?": 3.0
      "？": 3.0

    cancel:    # 取消
      取消: 10.0
      撤销: 9.0
      作废: 8.0
      不要了: 7.0
      cancel: 8.0
      abort: 7.0

    feedback:  # 反馈
      反馈: 10.0
      建议: 8.0
      意见: 7.0
      希望: 5.0
      feedback: 8.0
      suggest: 7.0

    pay:       # 支付
      付款: 10.0
      支付: 10.0
      转账: 8.0
      结账: 9.0
      充值: 7.0
      pay: 8.0
      checkout: 8.0

    login:     # 登录
      登录: 10.0
      登入: 9.0
      signup: 7.0
      login: 8.0

    register:  # 注册
      注册: 10.0
      开账号: 9.0
      创建账号: 9.0
      register: 8.0

  # ═══════════════════════════════════════════════════════════
  # 关键短语表 (intent -> { phrase -> weight })
  # 短语命中比单词权重高 1.2x, 更精确
  # ═══════════════════════════════════════════════════════════
  phrases:
    order:
      我要买: 12.0
      我想买: 12.0
      帮我买: 11.0
      买一下: 9.0
      帮我下: 10.0
      帮我订: 11.0

    complaint:
      我要退款: 13.0
      我想退款: 13.0
      退款!: 11.0
      退货!: 11.0
      差评!: 11.0
      申请退款: 12.0

    query:
      帮我查: 10.0
      帮我看看: 9.0
      有多少: 8.0
      查一下: 10.0
      看一下: 7.0

    consult:
      怎么用: 9.0
      怎么办: 9.0
      如何用: 9.0
      怎么操作: 10.0

    cancel:
      不要了: 12.0
      算了吧: 10.0
      取消吧: 11.0
      我撤销: 11.0

    pay:
      我付款: 11.0
      去支付: 11.0
      完成支付: 12.0
      去结账: 11.0

    login:
      我要登录: 12.0
      怎么登录: 11.0
      无法登录: 13.0

    register:
      我要注册: 12.0
      怎么注册: 11.0
      新账号: 10.0

  # ═══════════════════════════════════════════════════════════
  # 同义词字典 (word -> canonical standard)
  # 用于归一化扩展, 召回更多变体
  # ═══════════════════════════════════════════════════════════
  synonyms:
    退钱: 退款
    返钱: 退款
    退回: 退款
    退订: 退款
    refund: 退款
    chargeback: 退款
    dingdan: 订单
    order: 订单
    结账: 支付
    付款: 支付
    pay: 支付
    checkout: 支付
    转账: 支付
    充值: 支付
    差评: 投诉
    抱怨: 投诉
    complain: 投诉
    举报: 投诉
    咋办: 怎么办
    咋整: 怎么办
    "how to": 怎么
    how: 怎么
    买: 下单
    买一下: 下单
    buy: 下单
    purchase: 下单
    不要了: 取消
    算了吧: 取消
    撤销: 取消
    abort: 取消
    登入: 登录
    登陆: 登录
    signin: 登录
    signup: 注册
    注册账号: 注册
    创建账号: 注册
    开账号: 注册
    register: 注册

  # ═══════════════════════════════════════════════════════════
  # 简繁对照表 (繁 -> 简)
  # ═══════════════════════════════════════════════════════════
  traditional:
    訊息: 信息
    訊: 信
    檔案: 文件
    檔: 文
    網路: 网络
    網: 网
    資料: 数据
    資: 资
    訂單: 订单
    訂: 订
    付款: 付款
    賬: 账
    個: 个
    貨: 货
    銀: 银
    聯: 联

  # ═══════════════════════════════════════════════════════════
  # Benchmark 测试用例 (供 /benchmark 接口)
  # 添加更多用例可提高基准准确率覆盖率
  # 内部测试集: 20 个 (可扩展到 100+)
  # ═══════════════════════════════════════════════════════════
  benchmark:
    - text: "查询一下订单状态"
      expected: query
    - text: "我想买 10 台服务器"
      expected: order
    - text: "我要退款, 差评, 紧急!"
      expected: complaint
    - text: "紧急! 马上修复!!"
      expected: complaint
    - text: "13800138000 邮箱 test@example.com 支付 100 元, 明天发货"
      expected: pay
    - text: "非常棒, 谢谢!"
      expected: feedback
    - text: "我要付款 100 元"
      expected: pay
    - text: "查询订单状态"
      expected: query
    - text: "怎么登录?"
      expected: consult
    - text: "我要注册账号"
      expected: register
    - text: "帮我取消订单"
      expected: cancel
    - text: "退货!"
      expected: complaint
    - text: "购买 5 个 iPhone"
      expected: order
    - text: "不满意, 退款"
      expected: complaint
    - text: "非常感谢, 帮大忙了"
      expected: feedback
    - text: "dingdan zhuangtai"
      expected: query
    - text: "i want refund"
      expected: complaint
    - text: "无法登录怎么办?"
      expected: login
    - text: "帮我看看数据"
      expected: query
    - text: "下单 100 元"
      expected: order
