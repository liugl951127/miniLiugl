name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  MAVEN_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
  JAVA_VERSION: "17"
  NODE_VERSION: "18"

jobs:
  # ============================================
  # 后端编译 + 测试
  # ============================================
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root123456
          MARIADB_DATABASE: minimax
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Compile backend
        working-directory: backend
        run: |
          mvn -s .mvn/settings.xml compile -B -T 4
        continue-on-error: false

      - name: Run unit tests
        working-directory: backend
        run: |
          mvn -s .mvn/settings.xml test -B \
            -pl minimax-ai,minimax-common,minimax-multimodal,minimax-monitor \
            -Dmaven.test.skip=false
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/target/surefire-reports/
            backend/**/target/site/

  # ============================================
  # 前端编译
  # ============================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================
  # 前端 Vitest 单元测试 (Day 26)
  # ============================================
  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm run test:unit

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test:unit:coverage
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: frontend/coverage/
          retention-days: 7

  # ============================================
  # 前端 Playwright E2E 测试 (Day 26)
  # ============================================
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend]

    services:
      frontend-app:
        image: node:18-alpine
        ports:
          - 5173:5173
        options: >-
          --health-cmd="exit 0"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        env:
          VITE_USE_GATEWAY: 'false'
          VITE_API_BASE: 'http://host.docker.internal:8080'
        # 启动前端 dev server 供 Playwright 测试
        # 实际 CI 中需要先 npm run dev，简化处理：假设前端已 build 完成
        # E2E 测试使用已 build 的 dist (serve on 5173)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build frontend (for serve)
        working-directory: frontend
        run: npm run build

      - name: Serve dist and run E2E
        working-directory: frontend
        run: |
          npx serve dist -l 5173 &
          sleep 3
          npx playwright test --reporter=line,junit
        env:
          E2E_BASE_URL: 'http://localhost:5173'
        continue-on-error: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e-report/
          retention-days: 7

  # ============================================
  # Docker 镜像构建 (main 分支)
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        module:
          - minimax-gateway
          - minimax-auth
          - minimax-chat
          - minimax-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build JAR
        working-directory: backend
        run: |
          mvn -s .mvn/settings.xml package \
            -pl ${{ matrix.module }} -am -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.module
          build-args: |
            MODULE=${{ matrix.module }}
          push: false
          tags: minimax/${{ matrix.module }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 集成测试 (可选)
  # ============================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run integration tests
        working-directory: backend
        run: |
          mvn -s .mvn/settings.xml verify -B -DskipITs=false
        continue-on-error: true

  # ============================================
  # 总结
  # ============================================
  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, frontend-unit, frontend-e2e]
    if: always()

    steps:
      - name: Check status
        run: |
          if [ "${{ needs.backend.result }}" == "success" ] && \
             [ "${{ needs.frontend.result }}" == "success" ]; then
            echo "✅ All checks passed"
            exit 0
          else
            echo "❌ Some checks failed"
            echo "Backend: ${{ needs.backend.result }}"
            echo "Frontend: ${{ needs.frontend.result }}"
            exit 1
          fi
