plan:
  name: day17-v4-infrastructure
  summary: "Day 17 — V4 基础设施补全: Swagger文档 / i18n / 移动端H5 / WebSocket通知"
  next_deadline: "2026-06-21 20:00"

tasks:
  - id: swagger
    title: Swagger/OpenAPI 文档 + knife4j 全模块激活
    prompt: |
      在 backend 所有 Controller 上加 @Tag/@Operation 注解，并在相关模块的 application.yml 中激活 knife4j。

      涉及模块：minimax-auth, minimax-chat, minimax-model, minimax-memory, minimax-rag,
      minimax-function, minimax-agent, minimax-admin, minimax-prompt, minimax-monitor

      每个 Controller 类加 @Tag(name="模块中文名")，每个接口方法加 @Operation(summary="接口描述中文")。
      knife4j 已在 root pom 的 dependencyManagement 中定义，只需在各模块 yml 加:
        springdoc:
          api-docs:
            enabled: true
          swagger-ui:
            enabled: true
        knife4j:
          enable: true

      工作目录: /workspace/minimax-platform（注意实际路径是 /workspace/minimax-platform）

      操作步骤：
      1. 找到所有 Controller 文件（grep "Controller.java" 在 backend 各模块 src 目录）
      2. 每个 Controller 类加 @Tag(name="中文模块名")
      3. 每个 public 方法加 @Operation(summary="中文描述")
      4. 找各模块的 application.yml，加 knife4j 配置

      不要动 pom.xml。只加注解和 yml 配置。
      完成后回显修改的文件列表。
    assigned_to: scout
    timeout_ms: 1200000
    verify_skip_reason: "Swagger annotations are code changes verified by the self-check gate at plan end."

  - id: i18n
    title: 国际化 i18n 补全
    prompt: |
      为 MiniMax 平台补全前端国际化 i18n。

      步骤1: 读取现有 locale 文件了解结构:
        - /workspace/minimax-platform/frontend/src/i18n/locales/zh.js
        - /workspace/minimax-platform/frontend/src/i18n/locales/en.js

      步骤2: 在 zh.js 和 en.js 末尾（export default { 块内末尾）追加缺失的 section key。
      需要添加的 sections (只添加 zh 里没有的):
        tenant: { title:"租户管理", list:"租户列表", create:"创建租户", ... }
        admin: { title:"管理后台", dashboard:"仪表盘", users:"用户管理", ... }
        monitor: { title:"监控中心", health:"健康检查", alerts:"告警", ... }
        prompt: { title:"提示词模板", templates:"模板列表", create:"创建模板", ... }
        agent: { title:"Agent 自主任务", task:"任务", running:"运行中", ... }
        kg: { title:"知识图谱", graph:"图谱", entities:"实体", ... }
        collab: { title:"实时协作", online:"在线用户", typing:"正在输入", ... }
        plugins: { title:"插件市场", install:"安装", uninstall:"卸载", ... }
        about: { title:"关于", version:"版本", author:"作者", ... }

      步骤3: 在以下 17 个 Vue 文件中，加 `import { t } from '@/i18n'` 并将硬编码中文替换为 `t('section.key')`:
        /workspace/minimax-platform/frontend/src/views/admin/Index.vue
        /workspace/minimax-platform/frontend/src/views/agent/Index.vue
        /workspace/minimax-platform/frontend/src/views/auth/Login.vue
        /workspace/minimax-platform/frontend/src/views/auth/WechatScanPage.vue
        /workspace/minimax-platform/frontend/src/views/collab/Index.vue
        /workspace/minimax-platform/frontend/src/views/kg/Index.vue
        /workspace/minimax-platform/frontend/src/views/knowledge/Index.vue
        /workspace/minimax-platform/frontend/src/views/memory/Index.vue
        /workspace/minimax-platform/frontend/src/views/mobile/Index.vue
        /workspace/minimax-platform/frontend/src/views/mobile/Me.vue
        /workspace/minimax-platform/frontend/src/views/plugins/Index.vue
        /workspace/minimax-platform/frontend/src/views/prompts/Index.vue
        /workspace/minimax-platform/frontend/src/views/showcase/PluginShowcase.vue
        /workspace/minimax-platform/frontend/src/views/showcase/VideoGenShowcase.vue
        /workspace/minimax-platform/frontend/src/views/tenant/Index.vue
        /workspace/minimax-platform/frontend/src/views/user/CrossAppBinding.vue

      规则：
      - 英文翻译 key 用英文原文
      - format: t('section.key') — 符合现有 zh.js/en.js 风格
      - 不要改动已有使用 t() 的地方
      - 中文文件：zh.js/en.js 都改
      完成后回显修改的文件列表。
    assigned_to: general
    timeout_ms: 1200000
    verify_skip_reason: "i18n changes are code/text verified by the build gate at plan end."

  - id: mobile
