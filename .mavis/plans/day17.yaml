      同时确认 router/index.js 有移动端路由:
        /mobile/chat, /mobile/agent, /mobile/kg, /mobile/plugins, /mobile/me

      只改动 /workspace/minimax-platform/frontend/src/views/mobile/ 和 frontend/src/router/index.js
      完成后回显修改的文件列表。
    assigned_to: general
    timeout_ms: 900000
    verify_skip_reason: "Mobile H5 changes are UI changes verified by the build gate at plan end."

  - id: websocket
    title: WebSocket 实时通知中心
    prompt: |
      为 MiniMax 平台实现 WebSocket 实时通知中心。

      工作目录: /workspace/minimax-platform

      【后端 - minimax-auth 模块】
      1. sql/20_notification.sql:
         CREATE TABLE notification (
           id BIGINT AUTO_INCREMENT PRIMARY KEY,
           user_id BIGINT NOT NULL,
           type VARCHAR(50) NOT NULL COMMENT 'SESSION_CREATED/AGENT_COMPLETE/DOC_APPROVED...',
           title VARCHAR(255) NOT NULL,
           content TEXT,
           is_read TINYINT(1) DEFAULT 0,
           created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
           updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
           INDEX idx_user_id (user_id),
           INDEX idx_is_read (is_read)
         );

      2. Notification.java: 实体 (Lombok @Data/@NoArgsConstructor/@AllArgsConstructor, @TableName)

      3. NotificationMapper.java + NotificationMapper.xml (继承 BaseMapper<Notification>)

      4. NotificationService.java:
         - list(userId, page, size): 分页通知列表
         - unreadCount(userId): 未读数
         - markRead(id): 标记已读
         - markAllRead(userId): 全部已读
         - clear(userId): 清空
         - sendNotification(userId, type, title, content): 发送通知

      5. NotificationController.java:
         @RestController @RequestMapping("/notifications")
         @Tag(name="通知管理")
         - GET / - list
         - GET /unread-count - unreadCount
         - PUT /{id}/read - markRead
         - PUT /read-all - markAllRead
         - DELETE / - clear

      6. NotificationWebSocket.java:
         @ServerEndpoint("/ws/notifications")
         - @OnOpen: JWT 验证, 注册 session 到 ConcurrentHashMap
         - @OnMessage: 处理心跳/订阅
         - @OnClose: 移除 session
         - @OnError: 移除 session
         - sendToUser(userId, message): 推送消息给指定用户

      7. AuthApplication.java: 注入 WS endpoint (Spring 会自动注册 @ServerEndpoint)

      【通知触发 - 可选，在相关 Service 中注入 NotificationService】
      - ChatSessionService.createSession: 通知
      - AgentService 完成: 通知
      - DocumentService 审核通过: 通知

      【前端】
      1. src/api/notification.js:
         - listNotifications(page, size)
         - unreadCount()
         - markRead(id)
         - markAllRead()
         - clearNotifications()

      2. src/store/notification.js (Pinia):
         - state: notifications[], unreadCount
         - actions: fetchList, fetchUnread, markRead, markAllRead, clear
         - WebSocket 连接管理（在 store 初始化时连接 /ws/notifications）
         - ws onmessage: push 到 notifications, unreadCount++

      3. src/views/notification/Index.vue:
         - 通知列表（Vant List + Cell）
         - 未读高亮
         - 标记已读按钮
         - 全部已读/清空

      4. src/layout/Index.vue:
         - 右上角 🔔 图标 + unreadCount 红点 (el-badge 或 Vant Badge)
         - 点击跳转 /notification
         - activeMenu 高亮

      完成后回显修改的文件列表。
    assigned_to: general
    timeout_ms: 1200000
    verify_skip_reason: "WebSocket notification changes verified by the self-check gate at plan end."

gates:
  - id: self-check
    title: 自检门
    prompt: |
      运行以下 3 个检查，全部必须通过才算完成:
      1. bash /workspace/minimax-platform/scripts/self-check.sh (78+/78+)
      2. bash /workspace/minimax-platform/scripts/java-static-check.sh (0 错误)
      3. cd /workspace/minimax-platform/frontend && npm run build (必须成功)

      任一失败则 report failure with the exact error.

      全部通过则回显 "✅ ALL CHECKS PASSED"。
    verified_by: root
