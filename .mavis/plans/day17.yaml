      工作目录: /workspace/minimax-platform/frontend/src/views/mobile/

      优化以下 6 个页面（已有基础，改进体验）:

      1. Index.vue:
         - 移动端入口页，卡片式导航
         - Vant Cell Group: 对话/知识库/Memory/Agent/协作/插件/关于
         - 顶部平台名称 + 标语

      2. Chat.vue:
         - 完善聊天界面
         - 消息气泡：自己发的右对齐绿色，对方左对齐灰色
         - Vant Field 底部输入框 + 发送按钮
         - 会话列表（Vant List）

      3. Agent.vue:
         - Agent 任务输入 + 结果展示
         - Vant Input/Button
         - 加载状态 (Vant Loading)

      4. Kg.vue:
         - 知识图谱迷你展示
         - vue-echarts 简化图（只展示核心节点）
         - Vant Cell 节点列表

      5. Plugins.vue:
         - 插件卡片展示
         - Vant Card 组件
         - 安装/卸载按钮

      6. Me.vue:
         - 个人中心
         - Vant Cell: 头像/昵称/邮箱/退出登录
