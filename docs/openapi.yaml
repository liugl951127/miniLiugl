openapi: 3.0.3
info:
  title: MiniMax AI Platform API
  description: |
    MiniMax 大模型平台完整 REST API 规范（V5.9）。

    ## Base URL
    - Gateway: `http://localhost:7080`
    - Auth: `http://localhost:8081`
    - Chat: `http://localhost:8082`
    - Model: `http://localhost:8083`
    - Memory: `http://localhost:8084`
    - RAG: `http://localhost:8085`
    - Function: `http://localhost:8086`
    - Admin: `http://localhost:8087`
    - Multimodal: `http://localhost:8088`
    - Monitor: `http://localhost:8089`

    ## 认证
    除公开端点外，所有请求需携带 `Authorization: Bearer <accessToken>`。

    ## 统一响应格式
    ```json
    {
      "code": 0,
      "message": "OK",
      "data": {},
      "timestamp": 1234567890
    }
    ```

    ## 错误码
    - `0` 成功
    - `1000` 业务异常
    - `1001` 参数校验失败
    - `1002` 未登录
    - `1003` 无权限
    - `1500` 服务降级 / 限流
  version: "5.9.0"
  contact:
    name: MiniMax Platform Team
    url: https://github.com/liugl951127/miniLiugl

servers:
  - url: http://localhost:7080
    description: API Gateway (生产环境替换为真实域名)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: 认证鉴权（登录/注册/Token 管理）
  - name: Chat
    description: 对话会话管理
  - name: Model
    description: 模型管理与调用
  - name: Memory
    description: 短期/长期记忆与偏好
  - name: RAG
    description: 知识库检索增强
  - name: Function
    description: 工具函数管理
  - name: Admin
    description: 管理后台
  - name: Multimodal
    description: 多模态（图片理解）
  - name: Monitor
    description: 健康检查与指标监控

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Access Token（登录后获取）

  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
          description: 状态码，0=成功
        message:
          type: string
          description: 状态消息
        data:
          type: object
          nullable: true
          description: 响应数据
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    UserInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        nickname:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin@123

    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          example: alice@123
        nickname:
          type: string
          example: Alice
        email:
          type: string
          example: alice@example.com

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Access Token（30分钟有效）
        refreshToken:
          type: string
          description: Refresh Token（7天有效）
        expiresIn:
          type: integer
          description: 有效期（秒）
        userInfo:
          $ref: '#/components/schemas/UserInfo'

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    Session:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        title:
          type: string
        modelCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sessionId:
          type: integer
          format: int64
        role:
          type: string
          enum: [user, assistant, system, function]
        content:
          type: string
        modelCode:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatRequest:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
          default: user
        content:
          type: string
        modelCode:
          type: string
          example: gpt-4o

    StreamChatRequest:
      type: object
      properties:
        role:
          type: string
          default: user
        content:
          type: string
        modelCode:
          type: string
          example: gpt-4o
        temperature:
          type: number
          format: double
          default: 0.7
        maxTokens:
          type: integer
          default: 2048

    Model:
      type: object
      properties:
        code:
          type: string
          example: gpt-4o
        name:
          type: string
        provider:
          type: string
        type:
          type: string
          enum: [chat, embedding, image, audio]
        enabled:
          type: boolean
        rateLimit:
          type: integer
          description: 每分钟请求数

    RAGKnowledgeBase:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        ownerId:
          type: integer
          format: int64
        isPublic:
          type: boolean
        docCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    RAGAskRequest:
      type: object
      required:
        - kbId
        - question
      properties:
        kbId:
          type: integer
          format: int64
        question:
          type: string
        topK:
          type: integer
          default: 5

    RAGAskResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              chunkId:
                type: integer
                format: int64
              docTitle:
                type: string
              score:
                type: number
                format: float
              snippet:
                type: string

    FunctionTool:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
        parameters:
          type: string
          description: JSON Schema 格式
        endpoint:
          type: string
          format: uri
        httpMethod:
          type: string
          enum: [GET, POST, PUT, DELETE]
        enabled:
          type: boolean

    MemoryEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        sessionId:
          type: integer
          format: int64
        role:
          type: string
        content:
          type: string
        tags:
          type: string
        createdAt:
          type: string
          format: date-time

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN, DEGRADED]
        service:
          type: string
        timestamp:
          type: integer
          format: int64
        details:
          type: object
          additionalProperties: true

    Page:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
        total:
          type: integer
        size:
          type: integer
        current:
          type: integer
        pages:
          type: integer

paths:

  # ==================== Auth 模块 ====================
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: 注册新用户
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: alice
              password: alice@123
              nickname: Alice
              email: alice@example.com
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
              example:
                code: 0
                message: OK
                data:
                  id: 2
                  username: alice
                  nickname: Alice

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录（获取双 Token）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
              example:
                code: 0
                data:
                  accessToken: "eyJ..."
                  refreshToken: "eyJ..."
                  expiresIn: 1800
                  userInfo:
                    id: 1
                    username: admin
                    nickname: 管理员
                    roles: ["ADMIN"]

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 用 Refresh Token 续期
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 续期成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 登出（使 Token 失效）
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
              example:
                code: 0
                data:
                  id: 1
                  username: admin
                  nickname: 管理员
                  roles: ["ADMIN"]

  /api/v1/auth/users:
    get:
      tags: [Auth]
      summary: 用户列表（管理员）
      responses:
        '200':
          description: 分页用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    post:
      tags: [Auth]
      summary: 创建用户（管理员）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                nickname:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: 创建成功

  /api/v1/auth/users/{id}:
    put:
      tags: [Auth]
      summary: 更新用户信息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功

  /api/v1/auth/health:
    get:
      tags: [Auth]
      summary: Auth 服务健康检查（公开）
      security: []
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # ==================== Chat 模块 ====================
  /api/v1/sessions:
    get:
      tags: [Chat]
      summary: 列出当前用户的会话列表
      responses:
        '200':
          description: 会话列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
    post:
      tags: [Chat]
      summary: 创建新会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                modelCode:
                  type: string
                  example: gpt-4o
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/v1/sessions/{id}:
    get:
      tags: [Chat]
      summary: 获取会话详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    delete:
      tags: [Chat]
      summary: 删除会话
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功

  /api/v1/sessions/{id}/messages:
    get:
      tags: [Chat]
      summary: 获取会话的所有消息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 消息列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    post:
      tags: [Chat]
      summary: 非流式发消息
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: 消息响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/v1/sessions/{id}/messages/stream:
    post:
      tags: [Chat]
      summary: 流式发消息（SSE）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: streamId
          in: query
          required: true
          schema:
            type: string
          description: 流 ID（客户端生成，用于停止）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamChatRequest'
      responses:
        '200':
          description: SSE 流
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                chunk:
                  summary: 内容片段
                  value: |
                    data: {"type":"chunk","content":"你"}
                done:
                  summary: 结束
                  value: |
                    data: {"type":"done"}

  /api/v1/sessions/stop-stream:
    post:
      tags: [Chat]
      summary: 停止流式响应
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                streamId:
                  type: string
      responses:
        '200':
          description: 已停止

  # ==================== Model 模块 ====================
  /api/v1/models:
    get:
      tags: [Model]
      summary: 列出所有可用模型
      responses:
        '200':
          description: 模型列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    post:
      tags: [Model]
      summary: OpenAI 兼容 Chat 接口
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  example: gpt-4o
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                  format: double
                  default: 0.7
                maxTokens:
                  type: integer
                  default: 2048
      responses:
        '200':
          description: Chat 响应

  /api/v1/models/providers:
    get:
      tags: [Model]
      summary: 列出所有模型 Provider
      responses:
        '200':
          description: Provider 列表

  /api/v1/models/{code}:
    get:
      tags: [Model]
      summary: 获取模型详情
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 模型详情

  /api/v1/models/chat/stream:
    post:
      tags: [Model]
      summary: 流式 Chat（SSE）
      parameters:
        - name: streamId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                temperature:
                  type: number
      responses:
        '200':
          description: SSE 流

  /api/v1/models/chat/cancel:
    post:
      tags: [Model]
      summary: 取消流式响应
      parameters:
        - name: streamId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 已取消

  /api/v1/models/imagegen:
    post:
      tags: [Model]
      summary: 图片生成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                prompt:
                  type: string
                n:
                  type: integer
                  default: 1
                size:
                  type: string
                  example: "1024x1024"
      responses:
        '200':
          description: 图片生成结果

  # ==================== Memory 模块 ====================
  /api/v1/memory/short-term/{sid}:
    get:
      tags: [Memory]
      summary: 拉取短期记忆
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 记忆内容
    post:
      tags: [Memory]
      summary: 追加短期记忆
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        '200':
          description: 追加成功
    delete:
      tags: [Memory]
      summary: 清空短期记忆
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 已清空

  /api/v1/memory/short-term/{sid}/size:
    get:
      tags: [Memory]
      summary: 短期记忆容量统计
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 容量统计

  /api/v1/memory/cross-context:
    post:
      tags: [Memory]
      summary: 跨会话上下文整合
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                sessionId:
                  type: integer
                  format: int64
                systemPrompt:
                  type: string
                maxContext:
                  type: integer
                  default: 4096
                recallTopK:
                  type: integer
                  default: 5
      responses:
        '200':
          description: 整合后的上下文

  /api/v1/memory/summarize/{sid}:
    post:
      tags: [Memory]
      summary: 触发会话摘要
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 摘要生成中

  /api/v1/memory/summary/{sid}:
    get:
      tags: [Memory]
      summary: 读取会话摘要
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 摘要内容

  /api/v1/memory/long-term:
    post:
      tags: [Memory]
      summary: 存储长期记忆
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                sessionId:
                  type: integer
                  format: int64
                role:
                  type: string
                content:
                  type: string
                tags:
                  type: string
      responses:
        '200':
          description: 存储成功
    get:
      tags: [Memory]
      summary: 列出最近长期记忆
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 记忆列表

  /api/v1/memory/long-term/recall:
    post:
      tags: [Memory]
      summary: 召回长期记忆
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                query:
                  type: string
                topK:
                  type: integer
                  default: 5
      responses:
        '200':
          description: 召回结果

  /api/v1/memory/long-term/{id}:
    delete:
      tags: [Memory]
      summary: 删除长期记忆
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 已删除

  /api/v1/memory/pref/{key}:
    get:
      tags: [Memory]
      summary: 读取用户偏好
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 偏好值
    put:
      tags: [Memory]
      summary: 设置用户偏好
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
      responses:
        '200':
          description: 设置成功
    delete:
      tags: [Memory]
      summary: 删除用户偏好
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 已删除

  # ==================== RAG 模块 ====================
