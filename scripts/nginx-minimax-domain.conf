# =============================================================
# MiniMax 平台 - 生产 nginx 配置 (V1.9.1)
# 支持: HTTPS + 域名 + Let's Encrypt + WebSocket + CORS + 安全头
#
# 用法 (单机部署, nginx 直接装在宿主):
#   1. 申请证书: sudo certbot certonly --standalone -d your-domain.com
#   2. 拷贝配置: sudo cp nginx-minimax-domain.conf /etc/nginx/conf.d/minimax.conf
#   3. 替换占位符: 你的域名 / 证书路径
#   4. 重新加载: sudo nginx -t && sudo systemctl reload nginx
#
# 用法 (Docker 部署):
#   1. 用 certbot 生成证书后挂载到容器: -v /etc/letsencrypt:/etc/letsencrypt:ro
#   2. 容器 nginx 用这份配置
# =============================================================

# ===== 全局: gzip 压缩 =====
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml application/vnd.ms-fontobject
    application/x-font-ttf font/opentype image/svg+xml image/x-icon;

# ===== 上游 (后端微服务) =====
# V1.9.1: 端口 7080 (gateway), 8081 (auth)
# 单机部署用 127.0.0.1, Docker 部署用容器名 gateway:7080
upstream minimax_gateway {
    server 127.0.0.1:7080;          # 生产: nginx 同机 → gateway
    # server gateway:7080;          # Docker: 容器内 DNS
    keepalive 32;
    keepalive_timeout 60s;
}

upstream minimax_auth {
    server 127.0.0.1:8081;
    # server auth:8081;
    keepalive 16;
}

# ===== HTTP :80 → HTTPS :443 重定向 =====
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt http-01 验证用 (不要删)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部 301 跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS :443 (主入口) =====
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name your-domain.com www.your-domain.com;   # ← 替换成你的域名

    # ===== TLS 证书 (Let's Encrypt) =====
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;     # ← 替换
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;        # ← 替换
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;     # ← 替换

    # ===== TLS 协议 + 安全 =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;     # 让客户端优先 (TLS 1.3 推荐)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ===== 安全头 =====
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CORS (同源访问不需要, 跨域访问时浏览器会检查)
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Trace-Id, Idempotency-Key" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "X-Trace-Id, X-Response-Source" always;
    if ($request_method = OPTIONS) { return 204; }

    # ===== 上传大小 =====
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # ===== 访问/错误日志 =====
    access_log /var/log/nginx/minimax-access.log;
    error_log  /var/log/nginx/minimax-error.log warn;

    # ============================================================
    # 1. 前端 SPA 静态资源 (Vite build 输出)
    # ============================================================
    root /opt/minimax/frontend/dist;       # ← 单机部署路径
    # root /usr/share/nginx/html;          # Docker 容器内
    index index.html;

    # 1.1 根 / index.html - 不缓存
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # 1.2 带 hash 的静态资源 - 1y 强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.3 favicon
    location = /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.4 SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ============================================================
    # 2. /api/** → gateway (Nacos 路由 12 个微服务)
    # ============================================================
    location /api/ {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Trace-Id $http_x_trace_id;
        # 长连接 (跟 upstream keepalive 配合)
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================================
    # 3. /sse → gateway (Server-Sent Events)
    # ============================================================
    location /sse {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;       # 10 分钟长连接
    }

    # ============================================================
    # 4. WebSocket
    # ============================================================
    # 4.1 /ws/notifications → auth:8081 (Jakarta @ServerEndpoint)
    location = /ws/notifications {
        proxy_pass http://minimax_auth;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # 4.2 其他 /ws/* → gateway → ws:8095
    location /ws/ {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # 5. 健康检查 / 熔断降级 / API 文档
    # ============================================================
    location /actuator {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        allow 127.0.0.1;       # 只允许内网访问 actuator
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }

    location /fallback {
        proxy_pass http://minimax_gateway;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location = /api-docs {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /api-docs/ {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /doc.html {
        return 302 /api/v1/monitor/api-docs;
    }

    # ============================================================
    # 6. 限流 (可选, 防 CC / DDOS)
    # ============================================================
    # 需要先定义限流 zone: limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # location /api/ {
    #     limit_req zone=api_limit burst=50 nodelay;
    #     limit_req_status 429;
    #     ...
    # }
}