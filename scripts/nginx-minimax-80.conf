# =============================================================
# MiniMax 平台 nginx 配置 (V1 简化部署) - 端口 80 统一入口
#
# 架构:
#                                客户端浏览器
#                                     │
#                                     ▼
#                          ┌─────────────────────┐
#                          │  nginx :80          │
#                          │  (入口 + 静态资源)   │
#                          └─────────┬───────────┘
#                                    │
#              ┌─────────────────────┼─────────────────────┐
#              ▼                     ▼                     ▼
#    /         (前端 dist)    /api/*     (gateway 8080)    /ws      (gateway/auth)
#              │                     │                     │
#              ▼                     ▼                     ▼
#      ┌──────────────┐    ┌──────────────────┐    ┌──────────────────┐
#      │ dist/ 静态文件│    │ Spring Cloud GW  │    │ Gateway / Auth   │
#      │ (gzip + br)  │    │ (WebFlux)         │    │ WebSocket        │
#      └──────────────┘    │ 路由 + JWT + 限流  │    └──────────────────┘
#                          └──────────────────┘
#
# 用法 (Docker 部署):
#   docker compose -f docker-compose.yml up -d nginx
#   访问: http://localhost  (80 端口默认无需输入)
# =============================================================

# ===== gzip / br 预压缩配置 =====
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# ===== 入口 :80 (默认 HTTP 端口) =====
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 同源访问 (nginx 80 + 前端 dist 都在这里), 不需要 CORS
    # 但允许浏览器带 Origin 头时不报错
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Trace-Id, Idempotency-Key" always;
    add_header Access-Control-Expose-Headers "X-Trace-Id, X-Response-Source" always;
    if ($request_method = OPTIONS) { return 204; }

    # 访问日志
    access_log /var/log/nginx/minimax-access.log;
    error_log /var/log/nginx/minimax-error.log warn;

    # ============================================================
    # 1. 前端 SPA 静态资源 (Vite build 输出到 frontend/dist)
    # ============================================================
    root /usr/share/nginx/html;
    index index.html;

    # 1.1 根路径 / index.html — 不缓存, 始终拉新
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # 1.2 带 hash 的静态资源 (js/css/img) — 1y 强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.3 favicon
    location = /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.4 SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ============================================================
    # 2. /api/** → gateway :8080 (容器内 DNS gateway)
    # ============================================================
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================================
    # 3. /sse → gateway (Server-Sent Events)
    # ============================================================
    location /sse {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    # ============================================================
    # 4. WebSocket
    #    - /ws/notifications → auth:8081 (Jakarta @ServerEndpoint)
    #    - 其他 /ws/*         → gateway:8080 → ws:8095
    # ============================================================
    location = /ws/notifications {
        proxy_pass http://auth:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # 5. /actuator → gateway 健康检查
    # ============================================================
    location /actuator {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ============================================================
    # 6. /fallback → gateway 熔断降级
    # ============================================================
    location /fallback {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # ============================================================
    # 7. /api-docs → monitor 聚合入口
    # ============================================================
    location = /api-docs {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /api-docs/ {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /doc.html {
        return 302 /api/v1/monitor/api-docs;
    }
}