# =============================================================
# MiniMax Platform - 宿主机 nginx.conf (V1.9.8)
# 直接替换 /etc/nginx/nginx.conf, 不依赖 conf.d/*.conf
#
# 兼容 CentOS Stream 9 / RHEL 9 / Ubuntu 20+ / Debian 11+
# 保留宿主机 nginx 默认结构 (events/http/server), 只在 http {} 里加 server 块
#
# 用法:
#   sudo cp scripts/nginx.conf /etc/nginx/nginx.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
# =============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

# 加载动态模块 (CentOS/RHEL)
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 4096;  # V1.9.8: 提高到 4096 (默认 1024 不够)
    use epoll;                # Linux 优化
    multi_accept on;
}

http {
    # ===== 基础配置 (跟宿主机默认一致) =====
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_tokens off;  # 隐藏 nginx 版本

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # ===== gzip (V1.9.8 新增) =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml application/vnd.ms-fontobject
        application/x-font-ttf font/opentype image/svg+xml image/x-icon
        application/wasm;

    # ===== 客户端限制 =====
    client_max_body_size 100M;  # 文件上传
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ===== 上游 (后端微服务) =====
    # V1.9.7: 默认宿主机 nginx → 127.0.0.1:7080 (docker gateway 端口映射)
    upstream minimax_gateway {
        server 127.0.0.1:7080;
        keepalive 32;
        keepalive_timeout 60s;
    }

    upstream minimax_auth {
        server 127.0.0.1:8081;
        keepalive 16;
        keepalive_timeout 60s;
    }

    # ============================================================
    # 默认 server (HTTP :80)
    # ============================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt http-01 验证 (不要删)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ============================================================
        # 前端静态资源 (Vite dist)
        # 路径: /opt/miniLiugl/frontend/dist (默认)
        # ============================================================
        root /opt/miniLiugl/frontend/dist;  # V1.9.8: 会被脚本 sed 替换成实际路径
        index index.html;

        # 前端 history 模式 fallback (Vue Router)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            access_log off;  # 静态资源不记日志
        }

        # 禁止访问隐藏文件 (.git 等)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================================
        # 后端 API 反代 → gateway :7080
        # ============================================================
        # API (RESTful)
        location /api/ {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket (网关支持)
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            # 超时
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # 缓冲
            proxy_buffering off;
            proxy_request_buffering off;

            # 传递 cookies
            proxy_pass_header Set-Cookie;
        }

        # WebSocket (独立路径)
        location /ws {
            proxy_pass http://minimax_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_read_timeout 86400s;
        }

        # 健康检查 (不记日志)
        location /actuator/ {
            proxy_pass http://minimax_gateway;
            access_log off;
        }

        # Nacos 控制台 (可选, 内部用, 默认开)
        location /nacos/ {
            proxy_pass http://127.0.0.1:8848/nacos/;
            proxy_set_header Host $host;
        }

        # ============================================================
        # 安全头
        # ============================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # ============================================================
    # HTTPS :443 (可选, 配域名后启用)
    # 仅当 /etc/letsencrypt/live/<DOMAIN>/fullchain.pem 存在时才启用
    # 部署脚本 (setup-frontend-via-host-nginx.sh) 会自动管理
    # ============================================================
    # server {
    #     listen 443 ssl http2 default_server;
    #     listen [::]:443 ssl http2 default_server;
    #     server_name _;  # 配域名后改成具体域名
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # 同上的 location 块
    #     root /opt/miniLiugl/frontend/dist;
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    #     location /api/ {
    #         proxy_pass http://minimax_gateway;
    #         # ... 同上
    #     }
    # }
}
