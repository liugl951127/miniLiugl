# =============================================================
# MiniMax 平台 nginx 配置 (V5.8) - 端口 3000 入口方案
#
# 架构 (V5.7+):
#                                客户端浏览器
#                                     │
#                                     ▼
#                          ┌─────────────────────┐
#                          │  nginx :3000        │
#                          │  (入口 + 静态资源)   │
#                          └─────────┬───────────┘
#                                    │
#              ┌─────────────────────┼─────────────────────┐
#              ▼                     ▼                     ▼
#    /         (前端 dist)    /api/*     (gateway 8080)    /ws      (gateway 8080)
#              │                     │                     │
#              ▼                     ▼                     ▼
#      ┌──────────────┐    ┌──────────────────┐    ┌──────────────────┐
#      │ dist/ 静态文件│    │ Spring Cloud GW  │    │ Spring Cloud GW  │
#      │ (gzip + br)  │    │ (WebFlux)         │    │ → lb://minimax-ws│
#      └──────────────┘    │ 路由 + JWT + 限流  │    │ → 8095           │
#                          └──────────────────┘    └──────────────────┘
#
# V5.8 优化:
#   - 所有 /api/** 走 gateway (V5.5 Nacos 路由), 不用 12 个 location
#   - gzip + br 双预压缩, nginx 看 accept-encoding 自动选
#   - 静态资源 1y 强缓存 + immutable
#   - index.html 不缓存, 始终拉新
#   - proxy 超时细分 (普通 30s, SSE 60s, WS 24h)
#   - security headers
#
# 用法:
#   1. 启动 gateway + 12 微服务
#   2. cd frontend && npm run build (输出到 dist/)
#   3. sudo cp nginx-minimax-3000.conf /etc/nginx/conf.d/minimax.conf
#      sudo nginx -t && sudo systemctl reload nginx
#   4. 访问: http://localhost:3000
# =============================================================

# ===== gzip / br 预压缩配置 (V5.8) =====
# nginx 看到 .gz / .br 预压缩文件, 直接返回, 省 CPU
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# 启用 brotli (nginx 1.18+ 需 --with-http_brotli_module; Debian apt 安装)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

# ===== 入口 :3000 =====
server {
    listen 3000 default_server;
    server_name _;

    client_max_body_size 100M;

    # ===== V5.8 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Trace-Id, Idempotency-Key" always;
    add_header Access-Control-Expose-Headers "X-Trace-Id, X-Response-Source" always;
    if ($request_method = OPTIONS) { return 204; }

    # 访问日志 (含 traceId)
    log_format minimax '$remote_addr - $request_id [$time_iso8601] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/minimax-access.log minimax;
    error_log /var/log/nginx/minimax-error.log warn;

    # ============================================================
    # 1. 前端 SPA 静态资源 (Vite build 输出到 frontend/dist)
    # ============================================================
    root /opt/minimax/frontend/dist;
    index index.html;

    # 1.1 index.html — 不缓存, 始终拉新 (保证版本更新)
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # 1.2 带 hash 的静态资源 (js/css/img) — 1y 强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.3 favicon + 其他
    location = /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.4 SPA history fallback — 所有前端路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ============================================================
    # 2. /api/** → gateway :8080 (V5.5+ 统一入口, 12 微服务在 gateway 后)
    #    不用 12 个 location, 由 gateway + Nacos 路由
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # V5.8: 透传 traceId (gateway 也会生成, 但前端可传)
        proxy_set_header X-Trace-Id $http_x_trace_id;
        # V5.8: 30s 超时 (普通业务)
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================================
    # 3. /sse → gateway (Server-Sent Events, 长连接)
    # ============================================================
    location /sse {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_buffering off;          # SSE 关键
        proxy_cache off;              # SSE 不缓存
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;      # 10min 长连接
    }

    # ============================================================
    # 4. WebSocket (V5.9.3 精确分流)
    #    - /ws/notifications  → auth:8081 (Jakarta @ServerEndpoint, 绕过 gateway)
    #    - 其他 /ws/*          → gateway :8080 (lb://minimax-ws:8095 StreamGatewayHandler)
    #    V5.9.3: 注解为何不走 gateway: gateway 是 WebFlux reactive,
    #    Jakarta WS (@ServerEndpoint) 是 servlet 模型, gateway 转发会丢失
    #    upgrade 上下文 (OpenIssue: Spring Cloud Gateway WS 不支持 jakarta WS).
    # ============================================================
    location = /ws/notifications {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 24h 长连接 + 30s 读写超时
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # V5.9.3: 负载均衡使用 sticky session (基于 cookie)
        # Spring Cloud Gateway 4.x WS 通过 lb:ws:// 自动 sticky (同一 instance)
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # 5. /actuator → gateway 健康检查 (V5.8 暴露给 LB)
    # ============================================================
    location /actuator {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;  # 健康检查不记日志
    }

    # ============================================================
    # 6. /fallback → gateway 熔断降级端点
    # ============================================================
    location /fallback {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }
}

# =============================================================
# 内部直连 :8080 (gateway 自身, 供 LB / 内部调用)
# =============================================================
server {
    listen 127.0.0.1:8080;
    server_name _;
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}