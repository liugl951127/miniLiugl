# =============================================================
# MiniMax 平台 nginx 配置 (V5.3) - 端口 3000 入口方案
#
# 架构:
#                                客户端浏览器
#                                     │
#                                     ▼
#                          ┌─────────────────────┐
#                          │  nginx :3000        │
#                          │  (入口/反代)         │
#                          └─────────┬───────────┘
#                                    │
#              ┌─────────────────────┼─────────────────────┐
#              ▼                     ▼                     ▼
#    /         (前端)        /api/*     (微服务)    /ws      (WebSocket)
#              │                     │                     │
#              ▼                     ▼                     ▼
#      ┌──────────────┐    ┌──────────────────┐    ┌──────────────┐
#      │ Vite dev 3000│    │ nginx :8080       │    │ ws :8095     │
#      │ (前端)        │    │ (微服务路由)       │    │ (WebSocket)  │
#      └──────────────┘    └──────┬────────────┘    └──────────────┘
#                                 │
#                ┌────────────────┼────────────────┐
#                ▼                ▼                ▼
#          /api/v1/auth → :8081   ...        /api/v1/agent → :8090
#          /api/v1/chat → :8082               /api/v1/ws    → :8095
#          /api/v1/model → :8083              ...
#          ...
#
# 用法:
#   1. 启动 vite dev:    cd frontend && npm run dev   (端口 3000)
#   2. 启动 12 个微服务:  端口 8081-8095 (各模块)
#   3. 加载 nginx:        sudo cp nginx-minimax-3000.conf /etc/nginx/conf.d/minimax.conf
#                        sudo nginx -t && sudo systemctl reload nginx
#   4. 访问:              http://localhost:3000
# =============================================================

# ===== 入口 :3000 =====
server {
    listen 3000 default_server;
    server_name _;

    client_max_body_size 100M;

    # 启用 CORS
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    if ($request_method = OPTIONS) { return 204; }

    # ---------- 前端 Vite dev server (端口 3000 同端口) ----------
    # 这里用 location 块分流: /api → 8080, / → 3001 (vite)
    location / {
        # Vite dev server 实际端口 3001 (因为 3000 被 nginx 占用)
        # 或者用 unix socket / 第二实例
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # HMR + WebSocket 长连接
    }
}

# ===== 内部 API :8080 (微服务路由) =====
server {
    listen 127.0.0.1:8080;
    server_name _;
    client_max_body_size 100M;

    # ---------- 12 个微服务 (按路径前缀分流) ----------
    location /api/v1/auth/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location /api/v1/chat/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/model/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
    location /api/v1/memory/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/rag/ {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/function/ {
        proxy_pass http://127.0.0.1:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/admin/ {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/multimodal/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/monitor/ {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/agent/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }
    location /api/v1/prompt/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------- WebSocket (端口 8095) ----------
    location /ws/ {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;  # WS 长连接
    }
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}