# =============================================================
# MiniMax Platform - 完整 nginx 单文件配置 (V1.9.3)
# 直接替换系统的 /etc/nginx/nginx.conf 或 /etc/nginx/conf.d/minimax.conf
#
# 支持场景:
#   A. 单机部署: nginx + 后端 jar 在同一台机器 (127.0.0.1)
#   B. Docker 部署: nginx 通过容器名 DNS 反代 (gateway:7080)
#   C. 远程反代: nginx 反代到远程 gateway (10.0.0.x:7080)
#
# 用法:
#   1. 复制本文件到 /etc/nginx/conf.d/minimax.conf
#      sudo cp nginx-minimax-full.conf /etc/nginx/conf.d/minimax.conf
#   2. 替换占位符 your-domain.com 为你的域名
#   3. 替换 /opt/minimax/frontend/dist 为前端 dist 实际路径
#   4. 替换证书路径 /etc/letsencrypt/live/your-domain.com/
#   5. 测试: sudo nginx -t
#   6. 重载: sudo systemctl reload nginx
# =============================================================

# ===== 用户配置区 (替换这些变量) =====
# 域名
set $minimax_domain "your-domain.com";
set $minimax_www_domain "www.your-domain.com";

# 证书路径 (Let's Encrypt)
set $minimax_ssl_cert "/etc/letsencrypt/live/your-domain.com/fullchain.pem";
set $minimax_ssl_key  "/etc/letsencrypt/live/your-domain.com/privkey.pem";
set $minimax_ssl_chain "/etc/letsencrypt/live/your-domain.com/chain.pem";

# 前端 dist 路径
# 单机部署: /opt/minimax/frontend/dist
# Docker 部署: /usr/share/nginx/html (容器内)
set $minimax_frontend_root "/opt/minimax/frontend/dist";

# 后端 upstream 地址 (3 选 1)
# 单机部署:
#   upstream minimax_gateway { server 127.0.0.1:7080; ... }
#   upstream minimax_auth    { server 127.0.0.1:8081; ... }
# Docker 部署:
#   upstream minimax_gateway { server gateway:7080; ... }
#   upstream minimax_auth    { server auth:8081; ... }
# 远程反代:
#   upstream minimax_gateway { server 10.0.0.100:7080; ... }
# 下面用环境变量动态切换 (推荐)

# ===== 全局 gzip 配置 (放 /etc/nginx/nginx.conf 的 http {} 块) =====
# gzip on;
# gzip_vary on;
# gzip_proxied any;
# gzip_comp_level 6;
# gzip_min_length 1024;
# gzip_types text/plain text/css text/xml text/javascript
#     application/json application/javascript application/xml+rss
#     application/atom+xml application/vnd.ms-fontobject
#     application/x-font-ttf font/opentype image/svg+xml image/x-icon;

# ===== 上游 (后端微服务) =====
# 通过环境变量动态选择: 单机 / Docker / 远程
upstream minimax_gateway {
    # V1.9.5: 用宿主机 IP (因为 docker compose 把容器端口映射到宿主机, nginx 容器内访问 127.0.0.1 = 宿主机 = gateway 容器)
    # 比容器名 DNS 更稳定 (不依赖 docker network DNS 解析顺序)
    server 127.0.0.1:7080;
    # Docker 部署: 取消上面 + 取消下面注释
    # server gateway:7080;
    # 远程部署: 修改为 gateway 服务器 IP
    # server 10.0.0.100:7080;
    keepalive 32;
    keepalive_timeout 60s;
}

upstream minimax_auth {
    server 127.0.0.1:8081;  # V1.9.5: 宿主机 IP (docker compose 端口映射)
    # server auth:8081;
    keepalive 16;
    keepalive_timeout 60s;
}

# 可选: Prometheus / Grafana / Nacos 直连 (调试用, 默认不暴露)
# upstream minimax_nacos { server 127.0.0.1:8848; keepalive 8; }

# ===== HTTP :80 → HTTPS :443 重定向 =====
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt http-01 验证 (不要删)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 健康检查 (供 LB 用)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 其余全部 301 跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS :443 (主入口) =====
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name your-domain.com www.your-domain.com;

    # ===== TLS 证书 =====
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

    # ===== TLS 协议 + 安全 =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ===== 上传大小 =====
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # ===== 安全头 =====
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ===== CORS (同源访问不需要, 跨域时浏览器会检查) =====
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Trace-Id, Idempotency-Key" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "X-Trace-Id, X-Response-Source" always;
    if ($request_method = OPTIONS) { return 204; }

    # ===== 日志 =====
    access_log /var/log/nginx/minimax-access.log;
    error_log  /var/log/nginx/minimax-error.log warn;

    # ============================================================
    # 1. 前端 SPA 静态资源 (Vite build 输出)
    # ============================================================
    root /opt/minimax/frontend/dist;
    # Docker: 改 /usr/share/nginx/html
    index index.html;

    # 1.1 根 / index.html — 不缓存
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # 1.2 带 hash 的静态资源 — 1y 强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.3 favicon
    location = /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # 1.4 SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ============================================================
    # 2. /api/** → gateway (Nacos 路由 14 个微服务)
    # ============================================================
    location /api/ {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 可选: 限流 (防 CC / DDOS)
        # limit_req zone=api_limit burst=50 nodelay;
        # limit_req_status 429;
    }

    # ============================================================
    # 3. /sse → gateway (Server-Sent Events)
    # ============================================================
    location /sse {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    # ============================================================
    # 4. WebSocket
    # ============================================================
    # 4.1 /ws/notifications → auth:8081 (Jakarta @ServerEndpoint)
    location = /ws/notifications {
        proxy_pass http://minimax_auth;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # 4.2 其他 /ws/* → gateway → ws:8095
    location /ws/ {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }
    location /ws {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # 5. 健康检查 / 熔断降级 / API 文档
    # ============================================================
    # actuator 限内网访问 (防信息泄露)
    location /actuator {
        proxy_pass http://minimax_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;

        # 只允许内网访问
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # 熔断降级
    location /fallback {
        proxy_pass http://minimax_gateway;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # API 文档重定向
    location = /api-docs {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /api-docs/ {
        return 302 /api/v1/monitor/api-docs;
    }
    location = /doc.html {
        return 302 /api/v1/monitor/api-docs;
    }

    # ============================================================
    # 6. OpenTelemetry 转发 (V1.9.3+)
    # ============================================================
    # 如果 nginx 跟 otel-collector 在同一台机器, 可以直接转发 OTLP
    # 默认情况下微服务通过容器名 DNS 直接连 otel-collector, 不需要 nginx 转发
    # location /v1/traces { proxy_pass http://127.0.0.1:4318; }
    # location /v1/metrics { proxy_pass http://127.0.0.1:4318; }

    # ============================================================
    # 7. 错误页面自定义
    # ============================================================
    error_page 404 /index.html;                # SPA: 404 返回前端入口
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /opt/minimax/frontend/dist;
        internal;
    }
}

# =============================================================
# 可选: 内部服务 (Nacos / Grafana) 通过子域名访问
# 取消注释启用, 然后在 DNS 加 A 记录
# =============================================================
# server {
#     listen 443 ssl http2;
#     server_name nacos.your-domain.com;
