# ============================================================
# Docker Compose 精简部署 (V3.5.5+ 磁盘优化版)
# 6 个核心容器: mariadb + redis + auth + ai + gateway + nginx
# 适用环境: 2GB 内存 / 开发测试 / 沙箱 / 树莓派
# 完整版 17 微服务请用 docker-compose.yml (需要 8GB+)
#
# 磁盘优化:
#   - 后端 jar 拆分为多层 (layers), 增量构建
#   - SQL / 前端 dist / nginx.conf / yml 全部 bind mount
#   - 数据卷用命名 volume (mariadb/redis 持久化)
#   - /tmp 用 tmpfs (内存) , 业务文件用磁盘 bind
#
# 用法:
#   docker compose -f docker-compose.mini.yml up -d --build
#   或 ./deploy-mini.sh up
# ============================================================

version: "3.9"

# ============== 基础设施 (精简 2 容器) ==============
services:
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      MARIADB_USER: minimax
      MARIADB_PASSWORD: minimax_2024
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
    # 端口仅本机 (生产推荐内网)
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      # 命名 volume: 持久化数据到磁盘
      - minimax_mariadb:/var/lib/mysql
      # bind mount: SQL 初始化脚本 (磁盘 → 容器只读)
      - ./sql/complete.sql:/docker-entrypoint-initdb.d/01-complete.sql:ro
    # 临时目录用 tmpfs (内存, 不占磁盘)
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - minimax_redis_2024
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - minimax_redis:/data
    tmpfs:
      - /tmp:rw,size=32m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============== 核心 3 微服务 (auth + ai + gateway) ==============
  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: auth
    image: minimax-auth:latest
    container_name: minimax-auth
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_DB: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: minimax_redis_2024
      # 内存优化: 用 G1GC + 容器感知 + CDS, 不超过 384MB
      JAVA_OPTS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+UseContainerSupport"
    # 端口仅本机 (生产推荐内网, 经 nginx 80 统一入口)
    ports:
      - "127.0.0.1:8081:8081"
    # 磁盘挂载: yml/sql/logs/config 都是 bind mount, 不进 image layer
    volumes:
      # 配置 (YML) 实时生效, 无需重建镜像
      - ./backend/minimax-auth/src/main/resources:/app/config:ro
      # 日志写到宿主机磁盘, 便于排查
      - ./logs/auth:/app/logs
      # /tmp 用 tmpfs (java.io.tmpdir, 减少 IO)
    tmpfs:
      - /tmp:rw,size=128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: ai
    image: minimax-ai:latest
    container_name: minimax-ai
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8094
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_DB: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: minimax_redis_2024
      # ai 是核心 (Transformer + Spark + 知识库), 分配最多内存
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+UseContainerSupport"
    ports:
      - "127.0.0.1:8094:8094"
    volumes:
      - ./backend/minimax-ai/src/main/resources:/app/config:ro
      - ./logs/ai:/app/logs
    tmpfs:
      - /tmp:rw,size=256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: gateway
    image: minimax-gateway:latest
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SERVER_PORT: 7080
      JAVA_OPTS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70 -XX:+UseContainerSupport"
    ports:
      - "127.0.0.1:7080:7080"
    volumes:
      - ./backend/minimax-gateway/src/main/resources:/app/config:ro
      - ./logs/gateway:/app/logs
    tmpfs:
      - /tmp:rw,size=128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============== Nginx 反向代理 (前端 + 单端口入口) ==============
  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on:
      - gateway
    # 80 端口暴露公网 (单入口)
    ports:
      - "80:80"
    volumes:
      # bind mount: 配置文件 (磁盘 → 容器只读)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # bind mount: 前端构建产物 (Vite 重新构建无需重启 nginx)
      - ./frontend/dist:/usr/share/nginx/html:ro
      # 日志
      - ./logs/nginx:/var/log/nginx
    tmpfs:
      - /var/cache/nginx:rw,size=32m
      - /var/run:rw,size=16m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

# ============== 命名卷 (持久化到磁盘) ==============
volumes:
  minimax_mariadb:
    driver: local
  minimax_redis:
    driver: local

# ============== 网络 (默认 bridge, 容器内通过服务名互访) ==============
networks:
  default:
    name: minimax-net
