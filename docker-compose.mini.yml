# =============================================================
# MiniMax Platform V3.5.8 精简部署 (6 核心服务)
# 内存需求: 4GB+
# 用法:
#   ./start-all.sh up mini
# =============================================================
version: "3.9"

services:
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--innodb-buffer-pool-size=384M"]
    ports: ["3306:3306"]
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/complete.sql:/docker-entrypoint-initdb.d/01-complete.sql:ro
      - ./sql/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [minimax-net]
    deploy:
      resources: { limits: { memory: 768M } }

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: redis-server --requirepass minimax_redis_2024 --maxmemory 128mb
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 256M } } }

  gateway:
    build:
      context: ./backend
      dockerfile: minimax-gateway/Dockerfile
    image: minimax/gateway:latest
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      mariadb: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    ports: ["7080:7080"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  auth:
    build:
      context: ./backend
      dockerfile: minimax-auth/Dockerfile
    image: minimax/auth:latest
    container_name: minimax-auth
    restart: unless-stopped
    depends_on: [mariadb]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    ports: ["8081:8081"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 384M } } }

  ai:
    build:
      context: ./backend
      dockerfile: minimax-ai/Dockerfile
    image: minimax/ai:latest
    container_name: minimax-ai
    restart: unless-stopped
    depends_on: [mariadb]
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    ports: ["8094:8094"]
    volumes:
      - .docker-volumes/maven-repo:/root/.m2
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 512M } } }

  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on: [gateway, auth, ai]
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [minimax-net]
    deploy: { resources: { limits: { memory: 64M } } }

volumes:
  mariadb_data:
  redis_data:

networks:
  minimax-net:
    driver: bridge
