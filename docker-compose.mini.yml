# ============================================================
# Docker Compose 精简部署 (V3.5.5+)
# 6 个核心容器: mariadb + redis + auth + ai + gateway + nginx
# 适用环境: 2GB 内存 / 开发测试 / 沙箱 / 树莓派
# 完整版 17 微服务请用 docker-compose.yml (需要 8GB+)
#
# 用法:
#   docker compose -f docker-compose.mini.yml up -d --build
#   或 ./deploy-mini.sh up
# ============================================================

version: "3.9"

# ============== 基础设施 (精简 2 容器) ==============
services:
  mariadb:
    image: mariadb:10.11
    container_name: minimax-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root123456
      MARIADB_DATABASE: minimax_platform
      MARIADB_USER: minimax
      MARIADB_PASSWORD: minimax_2024
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
    ports:
      - "3306:3306"
    volumes:
      - minimax_mariadb:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: minimax-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "minimax_redis_2024", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - minimax_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "minimax_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============== 核心 3 微服务 (auth + ai + gateway) ==============
  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: auth
    image: minimax-auth:latest
    container_name: minimax-auth
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_DB: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: minimax_redis_2024
      JAVA_OPTS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: ai
    image: minimax-ai:latest
    container_name: minimax-ai
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8094
      SPRING_PROFILES_ACTIVE: mysql
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_DB: minimax_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: minimax_redis_2024
      # ai 是核心, 分配最多内存 (Transformer + Spark + 知识库 + 多模块)
      JAVA_OPTS: "-Xms384m -Xmx768m -XX:+UseG1GC -XX:MaxRAMPercentage=70"
    ports:
      - "8094:8094"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8094/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: gateway
    image: minimax-gateway:latest
    container_name: minimax-gateway
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SERVER_PORT: 7080
      JAVA_OPTS: "-Xms192m -Xmx384m -XX:+UseG1GC -XX:MaxRAMPercentage=70"
    ports:
      - "7080:7080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============== Nginx 反向代理 (前端 + 入口) ==============
  nginx:
    image: nginx:1.25-alpine
    container_name: minimax-nginx
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  minimax_mariadb:
  minimax_redis:
