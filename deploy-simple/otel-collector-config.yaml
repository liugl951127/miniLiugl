# =============================================================
# OpenTelemetry Collector 配置 (V1.9.3)
# 接收 15 个微服务的 OTLP 数据, 持久化到本地 + 暴露 Prometheus 指标
# =============================================================

receivers:
  # OTLP gRPC (主用, 推荐)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      # OTLP HTTP (备选)
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus 抓取 (后续可接各微服务的 /actuator/prometheus)
  prometheus:
    config:
      scrape_configs:
        - job_name: 'minimax-services'
          scrape_interval: 15s
          static_configs:
            - targets:
                - 'gateway:8080'
                - 'auth:8081'
                - 'chat:8082'
                - 'monitor:8089'
                - 'model:8084'

processors:
  # 批处理 (减少导出次数)
  batch:
    timeout: 5s
    send_batch_size: 1024

  # 内存限制
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # 添加资源属性 (服务名 / 环境)
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert
      - key: service.namespace
        value: minimax-platform
        action: upsert

  # 采样率 (生产 10%, 开发 100%)
  probabilistic_sampler:
    sampling_percentage: 100

exporters:
  # 调试输出 (开发用)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

  # 文件导出 (持久化 traces 到磁盘, 备份用)
  file:
    path: /var/lib/otel/traces.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10

  # Prometheus 指标 (供 Grafana 抓取)
  prometheus:
    endpoint: 0.0.0.0:8888
    const_labels:
      label1: minimax-platform
    resource_to_telemetry_conversion:
      enabled: true

  # 日志导出 (stdout, 配合 docker logs)
  logging:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  # 健康检查 + 性能指标
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:17777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  # 调试输出: 跟踪 spans 输出到 stdout + 文件
  extensions: [health_check, pprof, zpages]
  pipelines:
    # Traces 管道
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, probabilistic_sampler, batch]
      exporters: [debug, file, logging]

    # Metrics 管道
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]

    # Logs 管道 (V1.9.3 暂未启用, 后续接 ELK / Loki)
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging]